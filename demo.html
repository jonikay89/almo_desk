            FileManager, UserDefaults, Bundle, Notification, AppError, AnyHashable,

        class DemoViewController {
            constructor() {
                this.rootView = new UIView();
                this.rootView.init();
                this.rootView.frame = { x: 0, y: 0, width: window.innerWidth, height: window.innerHeight };
                this.rootView.backgroundColor = UIColor.white();
                document.getElementById('rootView').appendChild(this.rootView.element);

                this.scrollView = new UIScrollView();
                this.scrollView.init();
                this.scrollView.frame = { x: 0, y: 0, width: window.innerWidth, height: window.innerHeight };
                this.scrollView.backgroundColor = UIColor.colorWithWhiteAlpha(0.97, 1);
                this.rootView.addSubview(this.scrollView);

                this.setupComponents();
            }

            setupComponents() {
                const padding = 20;
                let yOffset = padding;

                const createView = (title, factory) => {
                    const view = factory();
                    view.frame = { x: padding, y: yOffset, width: window.innerWidth - padding * 2, height: view.frame?.height || 100 };
                    this.scrollView.addSubview(view);
                    yOffset += view.frame.height + padding;
                };

                createView('UITextField', () => this.createTextFieldDemos());
                createView('UITextView', () => this.createTextViewDemos());
                createView('UISwitch', () => this.createSwitchDemos());
                createView('UISlider', () => this.createSliderDemos());
                createView('UIStepper', () => this.createStepperDemos());
                createView('UISegmentedControl', () => this.createSegmentedDemos());
                createView('UIDatePicker', () => this.createDatePickerDemos());
                createView('UIStackView', () => this.createStackViewDemos());
                createView('UIProgressView', () => this.createProgressDemos());
                createView('UIActivityIndicatorView', () => this.createActivityDemos());
                createView('UIPageControl', () => this.createPageControlDemos());
                createView('UITableView', () => this.createTableViewDemos());
                createView('UICollectionView', () => this.createCollectionViewDemos());
                createView('UIPickerView', () => this.createPickerViewDemos());
                createView('UINavigationBar', () => this.createNavigationBarDemos());
                createView('UITabBar', () => this.createTabBarDemos());
                createView('UISearchBar', () => this.createSearchBarDemos());
                createView('UIAlertController', () => this.createAlertControllerDemos());
                createView('UIImageView', () => this.createImageViewDemos());
                createView('CGGeometry', () => this.createGeometryDemos());
                createView('Date', () => this.createDateDemos());
                createView('URL & URLComponents', () => this.createURLDemos());
                createView('UUID & Character', () => this.createUUIDDemos());
                createView('TimeZone & Calendar', () => this.createTimeZoneDemos());
                createView('Locale & Measurement', () => this.createLocaleMeasurementDemos());
                createView('FileManager & UserDefaults', () => this.createStorageDemos());
                createView('Notification & Error', () => this.createNotificationErrorDemos());
                createView('Formatters & Coders', () => this.createFormatterDemos());
                createView('Collections', () => this.createCollectionDemos());
                createView('Regex & Predicate', () => this.createRegexPredicateDemos());
                createView('Async & Locking', () => this.createAsyncLockingDemos());
                createView('Swift-like Chainable', () => this.createChainableDemos());
                createView('CALayer & Animations', () => this.createLayerDemos());
                createView('CALayer on Components', () => this.createLayerComponentDemos());
                createView('CGPath & Custom Drawing', () => this.createCGPathDemos());
                createView('TextStorage & Attributed', () => this.createTextStorageDemos());
            }

            createStackViewDemos() {
                const container = new UIView();
                container.init();
                container.frame = { x: 0, y: 0, width: 300, height: 180 };

                const hStack = new UIStackView();
                hStack.init();
                hStack.frame = { x: 0, y: 0, width: 280, height: 50 };
                hStack.axis = 'horizontal';
                hStack.distribution = 'fillEqually';
                hStack.spacing = 8;
                hStack.backgroundColor = UIColor.colorWithWhiteAlpha(0.95, 1);
                hStack.cornerRadius = 8;
                hStack.element.style.padding = '8px';

                const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1'];
                for (let i = 0; i < 3; i++) {
                    const box = new UILabel('Item ' + (i + 1));
                    box.init();
                    box.frame = { x: 0, y: 0, width: 80, height: 34 };
                    box.textAlignment = 'center';
                    box.backgroundColor = UIColor.colorWithHex(colors[i]);
                    box.textColor = UIColor.white();
                    box.cornerRadius = 6;
                    hStack.addArrangedSubview(box);
                }
                container.addSubview(hStack);

                const vStack = new UIStackView();
                vStack.init();
                vStack.frame = { x: 0, y: 60, width: 280, height: 120 };
                vStack.axis = 'vertical';
                vStack.distribution = 'fillEqually';
                vStack.spacing = 8;
                vStack.alignment = 'fill';
                vStack.backgroundColor = UIColor.colorWithWhiteAlpha(0.95, 1);
                vStack.cornerRadius = 8;
                vStack.element.style.padding = '8px';

                for (let i = 0; i < 3; i++) {
                    const box = new UILabel('Row ' + (i + 1));
                    box.init();
                    box.frame = { x: 0, y: 0, width: 264, height: 32 };
                    box.textAlignment = 'center';
                    box.backgroundColor = UIColor.colorWithHex(`hsl(${i * 60}, 70%, 60%)`);
                    box.textColor = UIColor.white();
                    box.cornerRadius = 6;
                    vStack.addArrangedSubview(box);
                }
                container.addSubview(vStack);

                return container;
            }

            createProgressDemos() {
                const container = new UIView();
                container.init();
                container.frame = { x: 0, y: 0, width: 300, height: 80 };

                const progressView = new UIProgressView();
                progressView.init();
                progressView.frame = { x: 0, y: 8, width: 220, height: 20 };
                progressView.progressTintColor = UIColor.systemGreen();
                progressView.trackTintColor = UIColor.lightGray();
                container.addSubview(progressView);

                const percentLabel = new UILabel('0%');
                percentLabel.init();
                percentLabel.frame = { x: 230, y: 8, width: 50, height: 20 };
                percentLabel.fontSize = 14;
                percentLabel.textColor = UIColor.gray();
                container.addSubview(percentLabel);

                const startButton = new UIButton('Start');
                startButton.init();
                startButton.frame = { x: 0, y: 40, width: 80, height: 32 };
                startButton.backgroundColor = UIColor.systemBlue();
                startButton.titleColor = UIColor.white();
                startButton.cornerRadius = 6;
                container.addSubview(startButton);

                const resetButton = new UIButton('Reset');
                resetButton.init();
                resetButton.frame = { x: 90, y: 40, width: 80, height: 32 };
                resetButton.backgroundColor = UIColor.gray();
                resetButton.titleColor = UIColor.white();
                resetButton.cornerRadius = 6;
                container.addSubview(resetButton);

                let progressInterval = null;

                startButton.addTarget({
                    onStart: () => {
                        if (progressInterval) return;
                        progressInterval = setInterval(() => {
                            let current = progressView.progress;
                            if (current >= 1) {
                                clearInterval(progressInterval);
                                progressInterval = null;
                                startButton.title = 'Start';
                                return;
                            }
                            progressView.setProgress(current + 0.1, true);
                            percentLabel.text = Math.round(progressView.progress * 100) + '%';
                        }, 200);
                    }
                }, 'onStart', 'click');

                resetButton.addTarget({
                    onReset: () => {
                        if (progressInterval) {
                            clearInterval(progressInterval);
                            progressInterval = null;
                        }
                        progressView.progress = 0;
                        percentLabel.text = '0%';
                    }
                }, 'onReset', 'click');

                return container;
            }

            createActivityDemos() {
                const container = new UIView();
                container.init();
                container.frame = { x: 0, y: 0, width: 300, height: 70 };

                const indicator = new UIActivityIndicatorView();
                indicator.init();
                indicator.frame = { x: 0, y: 10, width: 40, height: 40 };
                indicator.style = 'large';
                indicator.color = UIColor.systemBlue();
                indicator.startAnimating();
                container.addSubview(indicator);

                const toggleButton = new UIButton('Stop');
                toggleButton.init();
                toggleButton.frame = { x: 50, y: 15, width: 80, height: 32 };
                toggleButton.backgroundColor = UIColor.systemBlue();
                toggleButton.titleColor = UIColor.white();
                toggleButton.cornerRadius = 6;
                container.addSubview(toggleButton);

                let isAnimating = true;

                toggleButton.addTarget({
                    onToggle: () => {
                        if (isAnimating) {
                            indicator.stopAnimating();
                            toggleButton.title = 'Start';
                        } else {
                            indicator.startAnimating();
                            toggleButton.title = 'Stop';
                        }
                        isAnimating = !isAnimating;
                    }
                }, 'onToggle', 'click');

                return container;
            }

            createPageControlDemos() {
                const container = new UIView();
                container.init();
                container.frame = { x: 0, y: 0, width: 300, height: 70 };

                const pageControl = new UIPageControl();
                pageControl.init();
                pageControl.frame = { x: 0, y: 8, width: 150, height: 30 };
                pageControl.numberOfPages = 5;
                pageControl.currentPage = 0;
                pageControl.pageIndicatorTintColor = UIColor.lightGray();
                pageControl.currentPageIndicatorTintColor = UIColor.systemBlue();
                container.addSubview(pageControl);

                const prevButton = new UIButton('Prev');
                prevButton.init();
                prevButton.frame = { x: 160, y: 8, width: 60, height: 30 };
                prevButton.backgroundColor = UIColor.gray();
                prevButton.titleColor = UIColor.white();
                prevButton.cornerRadius = 4;
                prevButton.fontSize = 12;
                container.addSubview(prevButton);

                const nextButton = new UIButton('Next');
                nextButton.init();
                nextButton.frame = { x: 230, y: 8, width: 60, height: 30 };
                nextButton.backgroundColor = UIColor.gray();
                nextButton.titleColor = UIColor.white();
                nextButton.cornerRadius = 4;
                nextButton.fontSize = 12;
                container.addSubview(nextButton);

                prevButton.addTarget({
                    onPrev: () => {
                        if (pageControl.currentPage > 0) {
                            pageControl.currentPage -= 1;
                        }
                    }
                }, 'onPrev', 'click');

                nextButton.addTarget({
                    onNext: () => {
                        if (pageControl.currentPage < pageControl.numberOfPages - 1) {
                            pageControl.currentPage += 1;
                        }
                    }
                }, 'onNext', 'click');

                return container;
            }

            createTableViewDemos() {
                const container = new UIView();
                container.init();
                container.frame = { x: 0, y: 0, width: 300, height: 200 };

                const tableView = new UITableView();
                tableView.init();
                tableView.frame = { x: 0, y: 0, width: 300, height: 200 };
                tableView.rowHeight = 44;
                
                const dataSource = {
                    numberOfSectionsInTableView: (tv) => 1,  // Optional but good to have
                    tableView_numberOfRowsInSection: (tv, section) => 5,
                    tableView_cellForRowAt: (tv, indexPath) => {
                        // Dequeue reusable cell
                        let cell = tv.dequeueReusableCellWithIdentifier('Cell');
                        if (!cell) {
                            cell = new UITableViewCell('Cell');
                            cell.init();
                        }
                        cell.setText('Item ' + (indexPath.row + 1));
                        return cell;
                    }
                };

                tableView.dataSource = dataSource;
                tableView.reloadData();
                container.addSubview(tableView);

                return container;
            }

            createCGPathDemos() {
                const container = new UIView();
                container.init();

                const titleLabel = new UILabel('CGPath & Custom Drawing');
                titleLabel.init();

                titleLabel.textColor = UIColor.black();

                const circleView = new UIView()
                    .withCornerRadius(40)
                    .withShadow(UIColor.systemPink(), 0.4, { width: 0, height: 4 }, 8);
                circleView.init();
                circleView.frame = { x: 20, y: 35, width: 80, height: 80 };
                circleView.drawUsingHandler((ctx, bounds) => {
                    const centerX = bounds.width / 2;
                    const centerY = bounds.height / 2;
                    const radius = Math.min(bounds.width, bounds.height) / 2 - 10;
                    
                    const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, radius);
                    gradient.addColorStop(0, UIColor.systemPink().css);
                    gradient.addColorStop(1, UIColor.systemPurple().css);
                    
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                    ctx.fill();
                });
                container.addSubview(circleView);

                const rectView = new UIView();
                rectView.init();
                rectView.frame = { x: 110, y: 35, width: 80, height: 80 };
                rectView.withCornerRadius(12);
                rectView.withShadow(UIColor.systemBlue(), 0.3, { width: 0, height: 4 }, 8);
                
                const starPath = CGPath.CreateStar(40, 40, 35, 15, 5);
                rectView.addShape(starPath, UIColor.systemYellow(), UIColor.systemOrange(), 2);
                container.addSubview(rectView);

                    .withBorderColor(UIColor.systemGreen())
                    .withBorderWidth(1)
                    .withCornerRadius(8);
                container.addSubview(styledTextView);

                const textStorageFeatures = [
                    '• TextStorage for text management',
                    '• AttributedString with styles',
                    '• ParagraphStyle for layout',
                    '• CATextLayer rendering',
                    '• Chainable with* methods',
                    '• Layer-based border & corner radius'
                ];

                textStorageFeatures.forEach((feature, i) => {
                    const featLabel = new UILabel(feature);
                    featLabel.init();
                    featLabel.frame = { x: 0, y: 320 + i * 16, width: 300, height: 14 };
                    featLabel.fontSize = 10;
                    featLabel.textColor = UIColor.darkGray();
                    container.addSubview(featLabel);
                });

                return container;
            }
        }

        new DemoViewController();
    </script>
</body>
</html>
