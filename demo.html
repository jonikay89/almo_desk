<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UIKit Components Demo</title>
    <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
    <div id="rootView"></div>

    <script type="module">
        import { 
            UIScrollView, UIView, UILabel, UIButton, UITextField, UITextView,
            UISwitch, UISlider, UIStepper, UISegmentedControl, UIDatePicker,
            UIStackView, UIProgressView, UIActivityIndicatorView, UIPageControl,
            UITableView, UITableViewCell, UICollectionView, UICollectionViewCell, UICollectionViewFlowLayout,
            UINavigationBar, UINavigationItem, UITabBar, UITabBarItem,
            UISearchBar, UIAlertController, UIPickerView,
            UIColor
        } from './src/core/index.js';

        class DemoViewController {
            constructor() {
                this.rootView = new UIView();
                this.rootView.init();
                this.rootView.frame = { x: 0, y: 0, width: window.innerWidth, height: window.innerHeight };
                this.rootView.backgroundColor = UIColor.white();
                document.getElementById('rootView').appendChild(this.rootView.element);

                this.scrollView = new UIScrollView();
                this.scrollView.init();
                this.scrollView.frame = { x: 0, y: 0, width: window.innerWidth, height: window.innerHeight };
                this.scrollView.backgroundColor = UIColor.colorWithWhiteAlpha(0.97, 1);
                this.rootView.addSubview(this.scrollView);

                this.setupComponents();
            }

            setupComponents() {
                let yOffset = 20;
                const padding = 20;
                const contentWidth = window.innerWidth - padding * 2;

                yOffset = this.addSection('UITextField', [this.createTextFieldDemos()], yOffset, padding, contentWidth);
                yOffset = this.addSection('UITextView', [this.createTextViewDemos()], yOffset, padding, contentWidth);
                yOffset = this.addSection('UISwitch', [this.createSwitchDemos()], yOffset, padding, contentWidth);
                yOffset = this.addSection('UISlider', [this.createSliderDemos()], yOffset, padding, contentWidth);
                yOffset = this.addSection('UIStepper', [this.createStepperDemos()], yOffset, padding, contentWidth);
                yOffset = this.addSection('UISegmentedControl', [this.createSegmentedDemos()], yOffset, padding, contentWidth);
                yOffset = this.addSection('UIDatePicker', [this.createDatePickerDemos()], yOffset, padding, contentWidth);
                yOffset = this.addSection('UIStackView', [this.createStackViewDemos()], yOffset, padding, contentWidth);
                yOffset = this.addSection('UIProgressView', [this.createProgressDemos()], yOffset, padding, contentWidth);
                yOffset = this.addSection('UIActivityIndicatorView', [this.createActivityDemos()], yOffset, padding, contentWidth);
                yOffset = this.addSection('UIPageControl', [this.createPageControlDemos()], yOffset, padding, contentWidth);
                yOffset = this.addSection('UITableView', [this.createTableViewDemos()], yOffset, padding, contentWidth);
                yOffset = this.addSection('UICollectionView', [this.createCollectionViewDemos()], yOffset, padding, contentWidth);
                yOffset = this.addSection('UIPickerView', [this.createPickerViewDemos()], yOffset, padding, contentWidth);
                yOffset = this.addSection('UINavigationBar', [this.createNavigationBarDemos()], yOffset, padding, contentWidth);
                yOffset = this.addSection('UITabBar', [this.createTabBarDemos()], yOffset, padding, contentWidth);
                yOffset = this.addSection('UISearchBar', [this.createSearchBarDemos()], yOffset, padding, contentWidth);
                yOffset = this.addSection('UIAlertController', [this.createAlertControllerDemos()], yOffset, padding, contentWidth);

                this.scrollView.setContentSize(contentWidth, yOffset + 40);
            }

            addSection(title, views, yOffset, padding, contentWidth) {
                const sectionView = new UIView();
                sectionView.init();
                sectionView.frame = { x: padding, y: yOffset, width: contentWidth, height: this.calculateSectionHeight(views) };
                sectionView.backgroundColor = UIColor.white();
                sectionView.cornerRadius = 12;
                sectionView.element.style.boxShadow = '0 2px 8px rgba(0,0,0,0.1)';

                const header = new UILabel(title);
                header.init();
                header.frame = { x: 20, y: 16, width: contentWidth - 40, height: 24 };
                header.fontSize = 18;
                header.fontWeight = 'bold';
                header.textColor = UIColor.black();
                sectionView.addSubview(header);

                const separator = new UIView();
                separator.init();
                separator.frame = { x: 20, y: 48, width: contentWidth - 40, height: 2 };
                separator.backgroundColor = UIColor.systemBlue();
                sectionView.addSubview(separator);

                let componentY = 64;
                views.forEach(comp => {
                    comp.frame = { x: 20, y: componentY, width: contentWidth - 40, height: comp.frame.height };
                    sectionView.addSubview(comp);
                    componentY += comp.frame.height + 12;
                });

                this.scrollView.addSubview(sectionView);
                return yOffset + sectionView.frame.height + 24;
            }

            calculateSectionHeight(views) {
                let height = 64;
                views.forEach(v => height += v.frame.height + 12);
                return height;
            }

            createTextFieldDemos() {
                const container = new UIView();
                container.init();
                container.frame = { x: 0, y: 0, width: 300, height: 120 };

                const nameField = new UITextField('Enter your name');
                nameField.init();
                nameField.frame = { x: 0, y: 0, width: 260, height: 36 };
                nameField.borderStyle = 'rounded';
                container.addSubview(nameField);

                const emailField = new UITextField('email@example.com');
                emailField.init();
                emailField.frame = { x: 0, y: 44, width: 260, height: 36 };
                emailField.keyboardType = 'emailAddress';
                emailField.borderStyle = 'rounded';
                container.addSubview(emailField);

                const passwordField = new UITextField('Password');
                passwordField.init();
                passwordField.frame = { x: 0, y: 88, width: 260, height: 36 };
                passwordField.isSecureTextEntry = true;
                passwordField.borderStyle = 'rounded';
                container.addSubview(passwordField);

                return container;
            }

            createTextViewDemos() {
                const container = new UIView();
                container.init();
                container.frame = { x: 0, y: 0, width: 300, height: 140 };

                const textView = new UITextView('This is a multi-line text view...');
                textView.init();
                textView.frame = { x: 0, y: 0, width: 300, height: 120 };
                textView.isEditable = true;
                container.addSubview(textView);

                return container;
            }

            createSwitchDemos() {
                const container = new UIView();
                container.init();
                container.frame = { x: 0, y: 0, width: 300, height: 80 };

                const notifSwitch = new UISwitch();
                notifSwitch.init();
                notifSwitch.frame = { x: 0, y: 10, width: 50, height: 30 };
                notifSwitch.onTintColor = UIColor.systemGreen();
                container.addSubview(notifSwitch);

                const notifLabel = new UILabel('Notifications');
                notifLabel.init();
                notifLabel.frame = { x: 58, y: 10, width: 120, height: 30 };
                notifLabel.fontSize = 14;
                notifLabel.textColor = UIColor.black();
                notifLabel.lineHeight = 30;
                container.addSubview(notifLabel);

                const darkSwitch = new UISwitch();
                darkSwitch.init();
                darkSwitch.frame = { x: 0, y: 45, width: 50, height: 30 };
                darkSwitch.onTintColor = UIColor.systemIndigo();
                container.addSubview(darkSwitch);

                const darkLabel = new UILabel('Dark Mode');
                darkLabel.init();
                darkLabel.frame = { x: 58, y: 45, width: 120, height: 30 };
                darkLabel.fontSize = 14;
                darkLabel.textColor = UIColor.black();
                darkLabel.lineHeight = 30;
                container.addSubview(darkLabel);

                return container;
            }

            createSliderDemos() {
                const container = new UIView();
                container.init();
                container.frame = { x: 0, y: 0, width: 300, height: 90 };

                const volumeSlider = new UISlider();
                volumeSlider.init();
                volumeSlider.frame = { x: 0, y: 8, width: 220, height: 30 };
                volumeSlider.value = 0.5;
                volumeSlider.minimumTrackTintColor = UIColor.systemBlue();
                container.addSubview(volumeSlider);

                const volumeLabel = new UILabel('50%');
                volumeLabel.init();
                volumeLabel.frame = { x: 230, y: 8, width: 50, height: 24 };
                volumeLabel.fontSize = 14;
                volumeLabel.textColor = UIColor.gray();
                container.addSubview(volumeLabel);

                const brightSlider = new UISlider();
                brightSlider.init();
                brightSlider.frame = { x: 0, y: 50, width: 220, height: 30 };
                brightSlider.value = 0.5;
                brightSlider.minimumTrackTintColor = UIColor.systemYellow();
                container.addSubview(brightSlider);

                const brightLabel = new UILabel('50%');
                brightLabel.init();
                brightLabel.frame = { x: 230, y: 50, width: 50, height: 24 };
                brightLabel.fontSize = 14;
                brightLabel.textColor = UIColor.gray();
                container.addSubview(brightLabel);

                return container;
            }

            createStepperDemos() {
                const container = new UIView();
                container.init();
                container.frame = { x: 0, y: 0, width: 300, height: 90 };

                const qtyStepper = new UIStepper();
                qtyStepper.init();
                qtyStepper.frame = { x: 0, y: 8, width: 120, height: 36 };
                qtyStepper.minimumValue = 0;
                qtyStepper.maximumValue = 100;
                qtyStepper.stepValue = 1;
                container.addSubview(qtyStepper);

                const qtyLabel = new UILabel('Quantity: 0');
                qtyLabel.init();
                qtyLabel.frame = { x: 130, y: 12, width: 100, height: 24 };
                qtyLabel.fontSize = 14;
                qtyLabel.textColor = UIColor.black();
                container.addSubview(qtyLabel);

                const tempStepper = new UIStepper();
                tempStepper.init();
                tempStepper.frame = { x: 0, y: 52, width: 120, height: 36 };
                tempStepper.minimumValue = 32;
                tempStepper.maximumValue = 120;
                tempStepper.stepValue = 1;
                tempStepper.value = 72;
                container.addSubview(tempStepper);

                const tempLabel = new UILabel('Temperature: 72°F');
                tempLabel.init();
                tempLabel.frame = { x: 130, y: 56, width: 120, height: 24 };
                tempLabel.fontSize = 14;
                tempLabel.textColor = UIColor.black();
                container.addSubview(tempLabel);

                return container;
            }

            createSegmentedDemos() {
                const container = new UIView();
                container.init();
                container.frame = { x: 0, y: 0, width: 300, height: 100 };

                const sizeSegment = new UISegmentedControl(['S', 'M', 'L', 'XL']);
                sizeSegment.init();
                sizeSegment.frame = { x: 0, y: 8, width: 280, height: 36 };
                sizeSegment.tintColor = UIColor.systemBlue();
                container.addSubview(sizeSegment);

                const colorSegment = new UISegmentedControl(['Blue', 'Green', 'Orange']);
                colorSegment.init();
                colorSegment.frame = { x: 0, y: 52, width: 280, height: 36 };
                colorSegment.tintColor = UIColor.systemBlue();
                container.addSubview(colorSegment);

                return container;
            }

            createDatePickerDemos() {
                const container = new UIView();
                container.init();
                container.frame = { x: 0, y: 0, width: 300, height: 200 };

                const datePicker = new UIDatePicker();
                datePicker.init();
                datePicker.frame = { x: 0, y: 10, width: 300, height: 180 };
                datePicker.datePickerMode = 'date';
                container.addSubview(datePicker);

                return container;
            }

            createStackViewDemos() {
                const container = new UIView();
                container.init();
                container.frame = { x: 0, y: 0, width: 300, height: 180 };

                const hStack = new UIStackView();
                hStack.init();
                hStack.frame = { x: 0, y: 0, width: 280, height: 50 };
                hStack.axis = 'horizontal';
                hStack.distribution = 'fillEqually';
                hStack.spacing = 8;
                hStack.backgroundColor = UIColor.colorWithWhiteAlpha(0.95, 1);
                hStack.cornerRadius = 8;
                hStack.element.style.padding = '8px';

                const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1'];
                for (let i = 0; i < 3; i++) {
                    const box = new UILabel('Item ' + (i + 1));
                    box.init();
                    box.frame = { x: 0, y: 0, width: 80, height: 34 };
                    box.textAlignment = 'center';
                    box.backgroundColor = UIColor.colorWithHex(colors[i]);
                    box.textColor = UIColor.white();
                    box.cornerRadius = 6;
                    hStack.addArrangedSubview(box);
                }
                container.addSubview(hStack);

                const vStack = new UIStackView();
                vStack.init();
                vStack.frame = { x: 0, y: 60, width: 280, height: 120 };
                vStack.axis = 'vertical';
                vStack.distribution = 'fillEqually';
                vStack.spacing = 8;
                vStack.alignment = 'fill';
                vStack.backgroundColor = UIColor.colorWithWhiteAlpha(0.95, 1);
                vStack.cornerRadius = 8;
                vStack.element.style.padding = '8px';

                for (let i = 0; i < 3; i++) {
                    const box = new UILabel('Row ' + (i + 1));
                    box.init();
                    box.frame = { x: 0, y: 0, width: 264, height: 32 };
                    box.textAlignment = 'center';
                    box.backgroundColor = UIColor.colorWithHex(`hsl(${i * 60}, 70%, 60%)`);
                    box.textColor = UIColor.white();
                    box.cornerRadius = 6;
                    vStack.addArrangedSubview(box);
                }
                container.addSubview(vStack);

                return container;
            }

            createProgressDemos() {
                const container = new UIView();
                container.init();
                container.frame = { x: 0, y: 0, width: 300, height: 80 };

                const progressView = new UIProgressView();
                progressView.init();
                progressView.frame = { x: 0, y: 8, width: 220, height: 20 };
                progressView.progressTintColor = UIColor.systemGreen();
                progressView.trackTintColor = UIColor.lightGray();
                container.addSubview(progressView);

                const percentLabel = new UILabel('0%');
                percentLabel.init();
                percentLabel.frame = { x: 230, y: 8, width: 50, height: 20 };
                percentLabel.fontSize = 14;
                percentLabel.textColor = UIColor.gray();
                container.addSubview(percentLabel);

                const startButton = new UIButton('Start');
                startButton.init();
                startButton.frame = { x: 0, y: 40, width: 80, height: 32 };
                startButton.backgroundColor = UIColor.systemBlue();
                startButton.titleColor = UIColor.white();
                startButton.cornerRadius = 6;
                container.addSubview(startButton);

                const resetButton = new UIButton('Reset');
                resetButton.init();
                resetButton.frame = { x: 90, y: 40, width: 80, height: 32 };
                resetButton.backgroundColor = UIColor.gray();
                resetButton.titleColor = UIColor.white();
                resetButton.cornerRadius = 6;
                container.addSubview(resetButton);

                let progressInterval = null;

                startButton.addTarget({
                    onStart: () => {
                        if (progressInterval) return;
                        progressInterval = setInterval(() => {
                            let current = progressView.progress;
                            if (current >= 1) {
                                clearInterval(progressInterval);
                                progressInterval = null;
                                startButton.title = 'Start';
                                return;
                            }
                            progressView.setProgress(current + 0.1, true);
                            percentLabel.text = Math.round(progressView.progress * 100) + '%';
                        }, 200);
                    }
                }, 'onStart', 'click');

                resetButton.addTarget({
                    onReset: () => {
                        if (progressInterval) {
                            clearInterval(progressInterval);
                            progressInterval = null;
                        }
                        progressView.progress = 0;
                        percentLabel.text = '0%';
                    }
                }, 'onReset', 'click');

                return container;
            }

            createActivityDemos() {
                const container = new UIView();
                container.init();
                container.frame = { x: 0, y: 0, width: 300, height: 70 };

                const indicator = new UIActivityIndicatorView();
                indicator.init();
                indicator.frame = { x: 0, y: 10, width: 40, height: 40 };
                indicator.style = 'large';
                indicator.color = UIColor.systemBlue();
                indicator.startAnimating();
                container.addSubview(indicator);

                const toggleButton = new UIButton('Stop');
                toggleButton.init();
                toggleButton.frame = { x: 50, y: 15, width: 80, height: 32 };
                toggleButton.backgroundColor = UIColor.systemBlue();
                toggleButton.titleColor = UIColor.white();
                toggleButton.cornerRadius = 6;
                container.addSubview(toggleButton);

                let isAnimating = true;

                toggleButton.addTarget({
                    onToggle: () => {
                        if (isAnimating) {
                            indicator.stopAnimating();
                            toggleButton.title = 'Start';
                        } else {
                            indicator.startAnimating();
                            toggleButton.title = 'Stop';
                        }
                        isAnimating = !isAnimating;
                    }
                }, 'onToggle', 'click');

                return container;
            }

            createPageControlDemos() {
                const container = new UIView();
                container.init();
                container.frame = { x: 0, y: 0, width: 300, height: 70 };

                const pageControl = new UIPageControl();
                pageControl.init();
                pageControl.frame = { x: 0, y: 8, width: 150, height: 30 };
                pageControl.numberOfPages = 5;
                pageControl.currentPage = 0;
                pageControl.pageIndicatorTintColor = UIColor.lightGray();
                pageControl.currentPageIndicatorTintColor = UIColor.systemBlue();
                container.addSubview(pageControl);

                const prevButton = new UIButton('Prev');
                prevButton.init();
                prevButton.frame = { x: 160, y: 8, width: 60, height: 30 };
                prevButton.backgroundColor = UIColor.gray();
                prevButton.titleColor = UIColor.white();
                prevButton.cornerRadius = 4;
                prevButton.fontSize = 12;
                container.addSubview(prevButton);

                const nextButton = new UIButton('Next');
                nextButton.init();
                nextButton.frame = { x: 230, y: 8, width: 60, height: 30 };
                nextButton.backgroundColor = UIColor.gray();
                nextButton.titleColor = UIColor.white();
                nextButton.cornerRadius = 4;
                nextButton.fontSize = 12;
                container.addSubview(nextButton);

                prevButton.addTarget({
                    onPrev: () => {
                        if (pageControl.currentPage > 0) {
                            pageControl.currentPage -= 1;
                        }
                    }
                }, 'onPrev', 'click');

                nextButton.addTarget({
                    onNext: () => {
                        if (pageControl.currentPage < pageControl.numberOfPages - 1) {
                            pageControl.currentPage += 1;
                        }
                    }
                }, 'onNext', 'click');

                return container;
            }

            createTableViewDemos() {
                const container = new UIView();
                container.init();
                container.frame = { x: 0, y: 0, width: 300, height: 200 };

                const tableView = new UITableView();
                tableView.init();
                tableView.frame = { x: 0, y: 0, width: 300, height: 200 };
                tableView.rowHeight = 44;

                const dataSource = {
                    tableView_numberOfRowsInSection: (tv, section) => 5,
                    tableView_cellForRowAt: (tv, row, section) => {
                        const cell = new UITableViewCell();
                        cell.text = 'Item ' + (row + 1);
                        return cell;
                    }
                };

                tableView.dataSource = dataSource;
                tableView.reloadData();
                container.addSubview(tableView);

                return container;
            }

            createCollectionViewDemos() {
                const container = new UIView();
                container.init();
                container.frame = { x: 0, y: 0, width: 300, height: 220 };

                const layout = new UICollectionViewFlowLayout();
                layout.itemSize = { width: 80, height: 80 };
                layout.minimumInteritemSpacing = 10;
                layout.minimumLineSpacing = 10;
                layout.sectionInset = { top: 10, right: 10, bottom: 10, left: 10 };

                const collectionView = new UICollectionView({ x: 0, y: 0, width: 300, height: 220 }, layout);
                collectionView.init();
                collectionView.frame = { x: 0, y: 0, width: 300, height: 220 };

                const dataSource = {
                    numberOfItemsInCollectionView: (cv) => 9,
                    collectionView_cellForItemAt: (cv, index) => {
                        const cell = new UICollectionViewCell();
                        cell.label = 'Item ' + (index + 1);
                        cell.backgroundColor = UIColor.colorWithWhiteAlpha(0.5 + Math.random() * 0.5, 1);
                        return cell;
                    }
                };

                collectionView.dataSource = dataSource;
                collectionView.reloadData();
                container.addSubview(collectionView);

                return container;
            }

            createPickerViewDemos() {
                const container = new UIView();
                container.init();
                container.frame = { x: 0, y: 0, width: 300, height: 180 };

                const pickerView = new UIPickerView();
                pickerView.init();
                pickerView.frame = { x: 0, y: 10, width: 300, height: 160 };

                const dataSource = {
                    numberOfComponentsInPickerView: (pv) => 2,
                    pickerView_numberOfRowsInComponent: (pv, component) => component === 0 ? 5 : 10,
                    pickerView_titleForRow_forComponent: (pv, row, component) => {
                        return component === 0 ? ['Apple', 'Banana', 'Cherry', 'Date', 'Elderberry'][row] : String(row + 1);
                    }
                };

                pickerView.dataSource = dataSource;
                pickerView.reloadAllComponents();
                container.addSubview(pickerView);

                return container;
            }

            createNavigationBarDemos() {
                const container = new UIView();
                container.init();
                container.frame = { x: 0, y: 0, width: 300, height: 140 };

                const navBar = new UINavigationBar();
                navBar.init();
                navBar.frame = { x: 0, y: 0, width: 300, height: 44 };
                container.addSubview(navBar);

                const item = new UINavigationItem('Title');
                item.rightBarButtonItem = { title: 'Edit', action: () => console.log('Edit tapped') };
                navBar.pushNavigationItem(item, false);

                const infoLabel = new UILabel('Navigation bar demo');
                infoLabel.init();
                infoLabel.frame = { x: 0, y: 54, width: 300, height: 60 };
                infoLabel.fontSize = 14;
                infoLabel.textColor = UIColor.gray();
                infoLabel.textAlignment = 'center';
                container.addSubview(infoLabel);

                return container;
            }

            createTabBarDemos() {
                const container = new UIView();
                container.init();
                container.frame = { x: 0, y: 0, width: 300, height: 120 };

                const tabBar = new UITabBar();
                tabBar.init();
                tabBar.frame = { x: 0, y: 10, width: 300, height: 100 };

                const items = [
                    new UITabBarItem('Home'),
                    new UITabBarItem('Search'),
                    new UITabBarItem('Profile')
                ];
                items[0].emoji = '🏠';
                items[1].emoji = '🔍';
                items[2].emoji = '👤';

                tabBar.items = items;
                tabBar.selectedItem = items[0];
                container.addSubview(tabBar);

                return container;
            }

            createSearchBarDemos() {
                const container = new UIView();
                container.init();
                container.frame = { x: 0, y: 0, width: 300, height: 120 };

                const searchBar = new UISearchBar('Search...');
                searchBar.init();
                searchBar.frame = { x: 0, y: 10, width: 300, height: 44 };
                container.addSubview(searchBar);

                const resultsLabel = new UILabel('Enter search term');
                resultsLabel.init();
                resultsLabel.frame = { x: 0, y: 64, width: 300, height: 40 };
                resultsLabel.fontSize = 14;
                resultsLabel.textColor = UIColor.gray();
                resultsLabel.textAlignment = 'center';
                container.addSubview(resultsLabel);

                return container;
            }

            createAlertControllerDemos() {
                const container = new UIView();
                container.init();
                container.frame = { x: 0, y: 0, width: 300, height: 100 };

                const showAlertButton = new UIButton('Show Alert');
                showAlertButton.init();
                showAlertButton.frame = { x: 0, y: 10, width: 140, height: 36 };
                showAlertButton.backgroundColor = UIColor.systemBlue();
                showAlertButton.titleColor = UIColor.white();
                showAlertButton.cornerRadius = 6;
                container.addSubview(showAlertButton);

                showAlertButton.addTarget({
                    onShowAlert: () => {
                        const alert = new UIAlertController('Alert Title', 'This is an alert message.', 'alert');
                        alert.addAction('Cancel', 'cancel');
                        alert.addAction('OK', 'default');
                        alert.init();
                        alert.present();
                    }
                }, 'onShowAlert', 'click');

                const showActionSheetButton = new UIButton('Action Sheet');
                showActionSheetButton.init();
                showActionSheetButton.frame = { x: 150, y: 10, width: 140, height: 36 };
                showActionSheetButton.backgroundColor = UIColor.systemGreen();
                showActionSheetButton.titleColor = UIColor.white();
                showActionSheetButton.cornerRadius = 6;
                container.addSubview(showActionSheetButton);

                showActionSheetButton.addTarget({
                    onShowSheet: () => {
                        const sheet = new UIAlertController('Actions', 'Choose an action', 'actionSheet');
                        sheet.addAction('Option 1');
                        sheet.addAction('Option 2', 'destructive');
                        sheet.addAction('Cancel', 'cancel');
                        sheet.init();
                        sheet.present();
                    }
                }, 'onShowSheet', 'click');

                return container;
            }
        }

        new DemoViewController();
    </script>
</body>
</html>
