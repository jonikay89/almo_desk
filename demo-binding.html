<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UIKit Data Binding - Live Demo</title>
    <style>
        body { margin: 0; }
    </style>
</head>
<body>
    <script type="module">
        import {
            UIView, UIColor, UIFont,
            UILabel, UIButton, UITextField, UISlider,
            UIStackView,
            CurrentValueSubject, AnyCancellable, Binding,
            ObservableObject,
            NSLayoutConstraint,
            lazyVar
        } from './src/core/index.js';

        const vc = {};
        lazyVar(vc, 'cancellables', () => new Set());

        lazyVar(vc, 'screen', () => {
            const s = new UIStackView('vertical');
            s.alignment = 'fill';
            s.minHeight = '100vh';
            s.backgroundColor = UIColor.colorWithHex('#f5f5f7');
            document.body.appendChild(s.element);
            return s;
        });

        lazyVar(vc, 'app', () => {
            const s = new UIStackView('vertical');
            s.spacing = 20;
            s.padding = 20;
            s.alignment = 'fill';
            s.translatesAutoresizingMaskIntoConstraints = false;
            vc.screen.addSubview(s);

            NSLayoutConstraint.activateConstraints([
                s.widthAnchor.constraintLessThanOrEqualToConstant(1200),
                s.centerXAnchor.constraintEqualToAnchor(vc.screen.centerXAnchor),
                s.topAnchor.constraintEqualToAnchor(vc.screen.topAnchor),
                s.bottomAnchor.constraintEqualToAnchor(vc.screen.bottomAnchor),
            ]);
            return s;
        });

        const makeSection = () => {
            const s = new UIStackView('vertical');
            s.spacing = 10;
            s.backgroundColor = UIColor.white();
            s.layer.cornerRadius = 12;
            s.padding = 20;
            s.shadow = { offsetX: 0, offsetY: 2, radius: 8, color: 'rgba(0,0,0,0.08)' };
            return s;
        };

        const makeDemoArea = (axis = 'vertical') => {
            const s = new UIStackView(axis);
            s.spacing = 15;
            s.alignment = 'leading';
            s.backgroundColor = UIColor.colorWithHex('#f5f5f7');
            s.layer.cornerRadius = 8;
            s.padding = 20;
            s.minHeight = 60;
            return s;
        };

        const headingLabel = (text) => {
            const l = new UILabel(text);
            l.font = UIFont.boldSystemFont(18);
            l.textColor = UIColor.colorWithHex('#1d1d1f');
            return l;
        };

        const tagLabel = (text, color) => {
            const l = new UILabel(text);
            l.font = UIFont.systemFont(11, '600');
            l.textColor = UIColor.white();
            l.backgroundColor = UIColor.colorWithHex(color);
            l.layer.cornerRadius = 4;
            l.padding = { top: 2, left: 8, bottom: 2, right: 8 };
            return l;
        };

        const stateLabel = (text) => {
            const l = new UILabel(text);
            l.font = UIFont.systemFont(12);
            l.textColor = UIColor.colorWithHex('#666666');
            return l;
        };

        const valueLabel = (text) => {
            const l = new UILabel(text);
            l.font = UIFont.monospacedSystemFont(14, '600');
            return l;
        };

        const indicator = () => {
            const v = new UIView({ x: 0, y: 0, width: 10, height: 10 });
            v.layer.cornerRadius = 5;
            v.backgroundColor = UIColor.colorWithHex('#34c759');
            return v;
        };

        const logColorMap = {
            get ok() { const c = UIColor.colorWithHex('#4ec9b0'); Object.defineProperty(this, 'ok', { value: c }); return c; },
            get info() { const c = UIColor.colorWithHex('#569cd6'); Object.defineProperty(this, 'info', { value: c }); return c; },
            get warn() { const c = UIColor.colorWithHex('#ce9178'); Object.defineProperty(this, 'warn', { value: c }); return c; },
            get binding() { const c = UIColor.colorWithHex('#c586c0'); Object.defineProperty(this, 'binding', { value: c }); return c; },
        };

        const logArea = (title) => {
            const section = new UIStackView('vertical');
            section.spacing = 10;
            section.backgroundColor = UIColor.white();
            section.layer.cornerRadius = 12;
            section.padding = 20;
            section.shadow = { offsetX: 0, offsetY: 2, radius: 8, color: 'rgba(0,0,0,0.08)' };
            const heading = headingLabel(title);
            const logContainer = new UIView();
            logContainer.backgroundColor = UIColor.colorWithHex('#1e1e1e');
            logContainer.layer.cornerRadius = 8;
            logContainer.padding = 15;
            logContainer.maxHeight = '200px';
            logContainer.overflow = 'auto';
            section.addArrangedSubview(heading);
            section.addArrangedSubview(logContainer);
            vc.app.addArrangedSubview(section);
            return (msg, type = 'info') => {
                const entry = new UILabel(`[${new Date().toLocaleTimeString()}] ${msg}`);
                entry.font = UIFont.monospacedSystemFont(12);
                entry.textColor = logColorMap[type] || UIColor.colorWithHex('#d4d4d4');
                entry.numberOfLines = 0;
                logContainer.addSubview(entry);
                logContainer.scrollToBottom();
            };
        };

        // ── Section 1: CurrentValueSubject ──
        lazyVar(vc, 'log1', () => logArea('CurrentValueSubject Demo'));
        lazyVar(vc, 'log2', () => logArea('Two-Way Binding Demo'));
        lazyVar(vc, 'log3', () => logArea('Array Demo'));
        lazyVar(vc, 'log4', () => logArea('Transform Binding Demo'));

        lazyVar(vc, 'count', () => new CurrentValueSubject(42));
        vc.log1('Creating CurrentValueSubject with initial value: 42');
        vc.log1('Calling sink()...');
        const countCancellable = vc.count.sink((newValue, oldValue) => {
            vc.log1(`Value changed: ${oldValue} → ${newValue}`, 'ok');
        }).storeIn(vc.cancellables);

        vc.count.send(100);
        vc.log1('Sent 100');
        vc.count.send(100);
        vc.log1('Sent 100 again (no change expected)');
        vc.count.send(50);
        vc.log1('Sent 50');

        countCancellable.cancel();
        vc.log1('Cancelled. Sending 200 (no log expected)');
        vc.count.send(200);
        vc.log1(`History: ${JSON.stringify(vc.count.changeHistory.map(h => ({from: h.oldValue, to: h.newValue})))}`, 'binding');

        lazyVar(vc, 'source', () => new CurrentValueSubject('Hello'));
        lazyVar(vc, 'target', () => new CurrentValueSubject('World'));
        vc.log2('Two-way binding');
        lazyVar(vc, 'twoWayBinding', () => vc.source.bindTo(vc.target, { twoWay: true }));
        vc.twoWayBinding.activate();
        vc.log2(`source="${vc.source.value}", target="${vc.target.value}"`, 'ok');
        vc.source.send('Bonjour');
        vc.log2(`source="${vc.source.value}", target="${vc.target.value}"`, 'ok');
        vc.target.send('Mond');
        vc.log2(`source="${vc.source.value}", target="${vc.target.value}"`, 'ok');
        vc.twoWayBinding.deactivate();
        vc.source.send('Hola');
        vc.log2(`Deactivated. source="${vc.source.value}", target="${vc.target.value}"`, 'ok');

        lazyVar(vc, 'items', () => new CurrentValueSubject(['Apple', 'Banana', 'Cherry']));
        const itemsCancellable = vc.items.sink((arr) => {
            vc.log3(`[${arr.join(', ')}]`, 'ok');
        }).storeIn(vc.cancellables);
        vc.items.send([...vc.items.value, 'Date']);
        vc.items.send(vc.items.value.filter(i => i !== 'Banana'));
        itemsCancellable.cancel();

        lazyVar(vc, 'percentage', () => new CurrentValueSubject(100));
        lazyVar(vc, 'progressWidth', () => new CurrentValueSubject(0));
        lazyVar(vc, 'progressBinding', () => vc.percentage.bindTo(vc.progressWidth, {
            twoWay: false, transformTo: (p) => p * 2, transformFrom: (w) => w / 2
        }));
        vc.progressBinding.activate();
        vc.log4(`${vc.percentage.value}% → ${vc.progressWidth.value}px`, 'ok');
        vc.percentage.send(75);
        vc.log4(`${vc.percentage.value}% → ${vc.progressWidth.value}px`, 'ok');

        // ── Section 5: Interactive Binding Demo ──
        lazyVar(vc, 'section5', () => {
            const s = makeSection();
            const h = new UIStackView('horizontal');
            h.spacing = 10;
            h.alignment = 'center';
            h.addArrangedSubview(headingLabel('Interactive Binding Demo'));
            h.addArrangedSubview(tagLabel('Interactive', '#5856d6'));
            s.addArrangedSubview(h);
            vc.app.addArrangedSubview(s);
            return s;
        });

        lazyVar(vc, 'demoArea5', () => {
            const d = makeDemoArea('vertical');
            vc.section5.addArrangedSubview(d);
            return d;
        });

        lazyVar(vc, 'tfValue', () => new CurrentValueSubject('Hello'));
        lazyVar(vc, 'sliderValue', () => new CurrentValueSubject(210));
        lazyVar(vc, 'scaleValue', () => new CurrentValueSubject(1.0));

        lazyVar(vc, 'row1', () => {
            const r = new UIStackView('horizontal');
            r.spacing = 20;
            r.alignment = 'center';
            const tfState = new UIStackView('horizontal');
            tfState.spacing = 8;
            tfState.alignment = 'center';
            tfState.addArrangedSubview(stateLabel('TextField:'));
            lazyVar(vc, 'tfValLabel', () => valueLabel('Hello'));
            tfState.addArrangedSubview(vc.tfValLabel);
            tfState.addArrangedSubview(indicator());
            const lblState = new UIStackView('horizontal');
            lblState.spacing = 8;
            lblState.alignment = 'center';
            lblState.addArrangedSubview(stateLabel('Label:'));
            lazyVar(vc, 'lblValLabel', () => valueLabel('Hello'));
            lblState.addArrangedSubview(vc.lblValLabel);
            lblState.addArrangedSubview(indicator());
            r.addArrangedSubview(tfState);
            r.addArrangedSubview(lblState);
            vc.demoArea5.addArrangedSubview(r);
            return r;
        });

        lazyVar(vc, 'row2', () => {
            const r = new UIStackView('horizontal');
            r.spacing = 15;
            r.alignment = 'center';
            lazyVar(vc, 'tfInput', () => {
                const tf = new UITextField('Type something...');
                tf.font = UIFont.systemFont(14);
                tf.text = 'Hello';
                return tf;
            });
            lazyVar(vc, 'colorBoxView', () => {
                const v = new UIStackView('vertical');
                v.alignment = 'center';
                v.distribution = 'center';
                v.frame = { x: 0, y: 0, width: 80, height: 80 };
                v.layer.cornerRadius = 12;
                v.backgroundColor = UIColor.colorWithHSB(210 / 360, 1, 1);
                v.clipsToBounds = true;
                const lbl = new UILabel('BOX');
                lbl.font = UIFont.boldSystemFont(12);
                lbl.textColor = UIColor.white();
                lbl.textAlignment = 'center';
                v.addArrangedSubview(lbl);
                return v;
            });
            r.addArrangedSubview(vc.tfInput);
            r.addArrangedSubview(vc.colorBoxView);
            vc.demoArea5.addArrangedSubview(r);
            return r;
        });

        lazyVar(vc, 'row3', () => {
            const r = new UIStackView('horizontal');
            r.spacing = 15;
            r.alignment = 'center';
            lazyVar(vc, 'hueDesc', () => stateLabel('Hue: 210'));
            lazyVar(vc, 'hueSlider', () => {
                const s = new UISlider();
                s.minimumValue = 0;
                s.maximumValue = 360;
                s.value = 210;
                s.setContentHuggingPriority(1, 'horizontal');
                return s;
            });
            r.addArrangedSubview(vc.hueDesc);
            r.addArrangedSubview(vc.hueSlider);
            vc.demoArea5.addArrangedSubview(r);
            return r;
        });

        lazyVar(vc, 'row4', () => {
            const r = new UIStackView('horizontal');
            r.spacing = 20;
            r.alignment = 'center';
            const slState = new UIStackView('horizontal');
            slState.spacing = 8;
            slState.alignment = 'center';
            lazyVar(vc, 'slValLabel', () => valueLabel('210'));
            slState.addArrangedSubview(stateLabel('Slider Value:'));
            slState.addArrangedSubview(vc.slValLabel);
            const scState = new UIStackView('horizontal');
            scState.spacing = 8;
            scState.alignment = 'center';
            lazyVar(vc, 'scValLabel', () => valueLabel('1.0'));
            scState.addArrangedSubview(stateLabel('Box Scale:'));
            scState.addArrangedSubview(vc.scValLabel);
            lazyVar(vc, 'scaleSlider', () => {
                const s = new UISlider();
                s.minimumValue = 50;
                s.maximumValue = 150;
                s.value = 100;
                return s;
            });
            r.addArrangedSubview(slState);
            r.addArrangedSubview(scState);
            r.addArrangedSubview(vc.scaleSlider);
            vc.demoArea5.addArrangedSubview(r);
            return r;
        });

        vc.row1; vc.row2; vc.row3; vc.row4;

        vc.tfInput.addTarget(vc.tfValue, (sender) => { vc.tfValue.value = sender.text; });
        vc.hueSlider.addTarget(vc.sliderValue, (sender) => { vc.sliderValue.value = Math.round(sender.value); });
        vc.scaleSlider.addTarget(vc.scaleValue, (sender) => { vc.scaleValue.value = sender.value / 100; });

        vc.tfValue.sink((v) => { vc.tfValLabel.text = v; vc.lblValLabel.text = v; }).storeIn(vc.cancellables);
        vc.sliderValue.sink((v) => {
            vc.slValLabel.text = String(v);
            vc.hueDesc.text = `Hue: ${v}`;
            vc.colorBoxView.backgroundColor = UIColor.colorWithHSB(v / 360, 1, 1);
        }).storeIn(vc.cancellables);
        vc.scaleValue.sink((v) => {
            vc.scValLabel.text = v.toFixed(1);
            vc.colorBoxView.transform = `scale(${v})`;
        }).storeIn(vc.cancellables);

        // ── Section 6: ObservableObject + KVO Demo ──
        lazyVar(vc, 'section6', () => {
            const s = makeSection();
            const h = new UIStackView('horizontal');
            h.spacing = 10;
            h.alignment = 'center';
            h.addArrangedSubview(headingLabel('ObservableObject + KVO Demo'));
            h.addArrangedSubview(tagLabel('ObservableObject', '#ff9500'));
            s.addArrangedSubview(h);
            vc.app.addArrangedSubview(s);
            return s;
        });

        lazyVar(vc, 'demoArea6', () => {
            const d = makeDemoArea('vertical');
            vc.section6.addArrangedSubview(d);
            return d;
        });

        lazyVar(vc, 'objDisplay', () => {
            const d = new UIStackView('vertical');
            d.spacing = 4;
            d.backgroundColor = UIColor.colorWithHex('#fff3cd');
            d.layer.cornerRadius = 6;
            d.layer.borderWidth = 1;
            d.layer.borderColor = UIColor.colorWithHex('#ffc107');
            d.padding = 10;
            d.minHeight = 40;
            return d;
        });

        lazyVar(vc, 'objLabel', () => {
            const l = new UILabel('ObservableObject State');
            l.font = UIFont.systemFont(11);
            l.textColor = UIColor.colorWithHex('#856404');
            l.numberOfLines = 0;
            return l;
        });

        lazyVar(vc, 'objState', () => {
            const l = new UILabel('Loading...');
            l.font = UIFont.monospacedSystemFont(13);
            l.numberOfLines = 0;
            return l;
        });

        vc.objDisplay.addArrangedSubview(vc.objLabel);
        vc.objDisplay.addArrangedSubview(vc.objState);
        vc.demoArea6.addArrangedSubview(vc.objDisplay);

        lazyVar(vc, 'btnRow', () => {
            const r = new UIStackView('horizontal');
            r.spacing = 15;
            r.alignment = 'center';
            return r;
        });

        lazyVar(vc, 'btnName', () => {
            const b = new UIButton('Change Name');
            b.font = UIFont.systemFont(14, '600');
            return b;
        });
        lazyVar(vc, 'btnAge', () => {
            const b = new UIButton('Increment Age');
            b.backgroundColor = UIColor.colorWithHex('#34c759');
            b.font = UIFont.systemFont(14, '600');
            return b;
        });
        lazyVar(vc, 'btnEmail', () => {
            const b = new UIButton('Update Email');
            b.backgroundColor = UIColor.colorWithHex('#ff9500');
            b.font = UIFont.systemFont(14, '600');
            return b;
        });
        lazyVar(vc, 'btnReset', () => {
            const b = new UIButton('Reset All');
            b.backgroundColor = UIColor.colorWithHex('#5856d6');
            b.font = UIFont.systemFont(14, '600');
            return b;
        });

        vc.btnRow.addArrangedSubview(vc.btnName);
        vc.btnRow.addArrangedSubview(vc.btnAge);
        vc.btnRow.addArrangedSubview(vc.btnEmail);
        vc.btnRow.addArrangedSubview(vc.btnReset);
        vc.demoArea6.addArrangedSubview(vc.btnRow);

        class Person extends ObservableObject {
            constructor(name, age, email) {
                super();
                this._name = name;
                this._age = age;
                this._email = email;
                lazyVar(this, '_vCard', () => {
                    return `BEGIN:VCARD\nFN:${name}\nEMAIL:${email}\nEND:VCARD`;
                });
            }
            get name() { return this._name; }
            set name(v) { this.willChangeValue('name'); this._name = v; this.$set('name', v); this.didChangeValue('name'); }
            get age() { return this._age; }
            set age(v) { this.willChangeValue('age'); this._age = v; this.$set('age', v); this.didChangeValue('age'); }
            get email() { return this._email; }
            set email(v) { this.willChangeValue('email'); this._email = v; this.$set('email', v); this.didChangeValue('email'); }
            get displayName() { return `${this._name} (age ${this._age})`; }
            get vCard() { return this._vCard; }
        }

        lazyVar(vc, 'person', () => new Person('John', 30, 'john@example.com'));
        const updateDisplay = () => {
            vc.objState.text = JSON.stringify({
                name: vc.person.name,
                age: vc.person.age,
                email: vc.person.email,
                displayName: vc.person.displayName,
                vCard: vc.person.vCard,
            }, null, 2);
        };
        vc.person.$observe('name', (v) => vc.log1(`Name: ${v}`, 'binding'));
        vc.person.$observe('age', (v) => vc.log1(`Age: ${v}`, 'binding'));
        vc.person.$observe('email', (v) => vc.log1(`Email: ${v}`, 'binding'));
        vc.person.observe('name', (_, change) => {
            if (change.kind === 'set') vc.log1(`KVO: name = ${change.newValue}`, 'warn');
        }).storeIn(vc.cancellables);
        updateDisplay();

        vc.btnName.addTarget(() => { vc.person.name = vc.person.name === 'John' ? 'Jane' : 'John'; updateDisplay(); });
        vc.btnAge.addTarget(() => { vc.person.age = vc.person.age + 1; updateDisplay(); });
        vc.btnEmail.addTarget(() => { vc.person.email = `user${Date.now()}@example.com`; updateDisplay(); });
        vc.btnReset.addTarget(() => { vc.person.$unbindAll(); vc.person.name = 'John'; vc.person.age = 30; vc.person.email = 'john@example.com'; updateDisplay(); });

        // ── Section 7: Array Demo ──
        lazyVar(vc, 'section7', () => {
            const s = makeSection();
            const h = new UIStackView('horizontal');
            h.spacing = 10;
            h.alignment = 'center';
            h.addArrangedSubview(headingLabel('Array Demo'));
            h.addArrangedSubview(tagLabel('Interactive', '#ff9500'));
            s.addArrangedSubview(h);
            vc.app.addArrangedSubview(s);
            return s;
        });

        lazyVar(vc, 'demoArea7', () => {
            const d = makeDemoArea('vertical');
            vc.section7.addArrangedSubview(d);
            return d;
        });

        lazyVar(vc, 'fruitList', () => {
            const f = new UIStackView('vertical');
            f.spacing = 8;
            f.alignment = 'fill';
            vc.demoArea7.addArrangedSubview(f);
            return f;
        });

        lazyVar(vc, 'fruitRow', () => {
            const r = new UIStackView('horizontal');
            r.spacing = 15;
            r.alignment = 'center';
            r.margin = { top: 15 };
            return r;
        });

        lazyVar(vc, 'newItemInput', () => {
            const tf = new UITextField('New item name...');
            tf.font = UIFont.systemFont(14);
            return tf;
        });
        lazyVar(vc, 'btnAdd', () => {
            const b = new UIButton('Add');
            b.font = UIFont.systemFont(14, '600');
            return b;
        });
        lazyVar(vc, 'btnRemove', () => {
            const b = new UIButton('Remove Last');
            b.backgroundColor = UIColor.colorWithHex('#34c759');
            b.font = UIFont.systemFont(14, '600');
            return b;
        });
        lazyVar(vc, 'btnClear', () => {
            const b = new UIButton('Clear All');
            b.backgroundColor = UIColor.colorWithHex('#ff9500');
            b.font = UIFont.systemFont(14, '600');
            return b;
        });

        vc.fruitRow.addArrangedSubview(vc.newItemInput);
        vc.fruitRow.addArrangedSubview(vc.btnAdd);
        vc.fruitRow.addArrangedSubview(vc.btnRemove);
        vc.fruitRow.addArrangedSubview(vc.btnClear);
        vc.demoArea7.addArrangedSubview(vc.fruitRow);

        lazyVar(vc, 'fruits', () => new CurrentValueSubject(['Apple', 'Banana', 'Cherry', 'Date']));
        const renderFruits = (arr) => {
            vc.fruitList.removeAllArrangedSubviews();
            arr.forEach((fruit, index) => {
                const item = new UIStackView('vertical');
                item.spacing = 2;
                item.backgroundColor = UIColor.colorWithHex('#f0f0f0');
                item.padding = { top: 12, left: 16, bottom: 12, right: 16 };
                item.layer.cornerRadius = 8;
                const title = new UILabel(fruit);
                title.font = UIFont.systemFont(14, '500');
                const sub = new UILabel(`Index: ${index}`);
                sub.font = UIFont.systemFont(12);
                sub.textColor = UIColor.colorWithHex('#666666');
                item.addArrangedSubview(title);
                item.addArrangedSubview(sub);
                vc.fruitList.addArrangedSubview(item);
            });
        };
        vc.fruits.sink((arr) => renderFruits(arr)).storeIn(vc.cancellables);

        vc.btnAdd.addTarget(() => {
            const text = vc.newItemInput.text.trim();
            if (text) { vc.fruits.send([...vc.fruits.value, text]); vc.newItemInput.text = ''; }
        });
        vc.btnRemove.addTarget(() => { const a = [...vc.fruits.value]; a.pop(); vc.fruits.send(a); });
        vc.btnClear.addTarget(() => { vc.fruits.send([]); });


    </script>
</body>
</html>
