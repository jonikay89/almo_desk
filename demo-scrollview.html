<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UIScrollView Enhanced - Live Demo</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f7; padding: 20px; }
        #app { max-width: 1200px; margin: 0 auto; }
        h1 { color: #1d1d1f; margin-bottom: 30px; font-size: 28px; }
        h2 { color: #1d1d1f; font-size: 18px; margin-bottom: 15px; }
        .tag { font-size: 11px; background: #007aff; color: white; padding: 2px 8px; border-radius: 4px; }
        .tag.scroll { background: #5856d6; }
        .tag.enhanced { background: #34c759; }
        .section { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .demo-area { background: #f5f5f7; border-radius: 8px; padding: 20px; min-height: 200px; display: flex; align-items: center; flex-wrap: wrap; gap: 15px; }
        .log { background: #1e1e1e; color: #d4d4d4; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 12px; max-height: 200px; overflow-y: auto; }
        .log-entry { margin: 2px 0; }
        .log-entry.ok { color: #4ec9b0; }
        .log-entry.info { color: #569cd6; }
        .log-entry.scroll { color: #c586c0; }
        .btn { padding: 10px 20px; background: #007aff; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; }
        .btn:hover { background: #0056cc; }
        .btn.green { background: #34c759; }
        .btn.small { padding: 5px 10px; font-size: 12px; }
        .info { font-size: 12px; color: #86868b; margin-bottom: 10px; }
        .state-display { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; margin-top: 10px; padding: 10px; background: #f0f0f0; border-radius: 6px; }
        .state-item { display: flex; align-items: center; gap: 8px; }
        .state-label { font-size: 12px; color: #666; }
        .state-value { font-family: monospace; font-size: 14px; font-weight: 600; }
    </style>
</head>
<body>
    <div id="app"></div>
    <script type="module">
        import {
            UIView, UIScrollView, UIScrollViewDelegate,
            UILabel, UIButton, UISlider
        } from './src/core/index.js';

        const app = document.getElementById('app');

        const logArea = (title) => {
            const section = document.createElement('div');
            section.className = 'section';
            section.innerHTML = `<h2>${title}</h2><div class="log" id="log-${Math.random().toString(36).slice(2)}"></div>`;
            app.appendChild(section);
            const log = section.querySelector('.log');
            return (msg, type = 'info') => {
                const entry = document.createElement('div');
                entry.className = `log-entry ${type}`;
                entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
                log.appendChild(entry);
                log.scrollTop = log.scrollHeight;
            };
        };

        const log = logArea('UIScrollView Delegate Events');

        // Demo 1: Basic scrolling with color boxes
        const section1 = document.createElement('div');
        section1.className = 'section';
        section1.innerHTML = `
            <h2>Enhanced UIScrollView <span class="tag enhanced">Scroll + Bounce</span></h2>
            <p class="info">Drag to scroll. Scroll indicators appear while scrolling. Bounce at edges.</p>
            <div class="demo-area">
                <div id="scroll-container" style="width:300px;height:200px;border:2px solid #ddd;border-radius:8px;overflow:hidden;position:relative;background:white;"></div>
                <div>
                    <button class="btn" id="btn-scroll-top">Scroll to Top</button>
                    <button class="btn" id="btn-scroll-bottom">Scroll to Bottom</button>
                    <button class="btn green" id="btn-flash">Flash Indicators</button>
                </div>
            </div>
            <div class="state-display">
                <div class="state-item">
                    <span class="state-label">Offset:</span>
                    <span class="state-value" id="state-offset">x: 0, y: 0</span>
                </div>
                <div class="state-item">
                    <span class="state-label">Dragging:</span>
                    <span class="state-value" id="state-dragging">false</span>
                </div>
                <div class="state-item">
                    <span class="state-label">Decelerating:</span>
                    <span class="state-value" id="state-decelerating">false</span>
                </div>
            </div>
        `;
        app.appendChild(section1);

        const container1 = document.getElementById('scroll-container');
        
        const scrollView = new UIScrollView({ x: 0, y: 0, width: 300, height: 200 });
        scrollView.init();
        scrollView.contentSize = { width: 600, height: 400 };
        scrollView.bounces = true;
        scrollView.alwaysBounceHorizontal = true;
        scrollView.alwaysBounceVertical = true;
        container1.appendChild(scrollView._element);

        const colors = [
            ['#ff3b30', 'Red'], ['#ff9500', 'Orange'], ['#ffcc00', 'Yellow'],
            ['#34c759', 'Green'], ['#007aff', 'Blue'], ['#5856d6', 'Indigo'],
            ['#af52de', 'Purple'], ['#ff2d55', 'Pink'], ['#00c7be', 'Teal'],
            ['#ff6b35', 'Coral'], ['#7cb342', 'Lime'], ['#5c6bc0', 'Light Indigo']
        ];

        colors.forEach(([color, name], i) => {
            const box = document.createElement('div');
            box.style.cssText = `
                width: 80px;
                height: 80px;
                background: ${color};
                border-radius: 8px;
                display: flex;
                align-items: center;
                justify-content: center;
                color: white;
                font-size: 11px;
                font-weight: 600;
                position: absolute;
                left: ${(i % 4) * 90 + 10}px;
                top: ${Math.floor(i / 4) * 90 + 10}px;
            `;
            box.textContent = name;
            scrollView._contentElement.appendChild(box);
        });

        const scrollDelegate = {
            scrollViewWillBeginDragging(sv) {
                log(`Will Begin Dragging`, 'scroll');
                document.getElementById('state-dragging').textContent = 'true';
            },
            scrollViewDidEndDragging(sv, decelerate) {
                log(`Did End Dragging - decelerate: ${decelerate}`, 'scroll');
                document.getElementById('state-dragging').textContent = 'false';
            },
            scrollViewWillBeginDecelerating(sv) {
                log(`Will Begin Decelerating`, 'scroll');
                document.getElementById('state-decelerating').textContent = 'true';
            },
            scrollViewDidEndDecelerating(sv) {
                log(`Did End Decelerating`, 'scroll');
                document.getElementById('state-decelerating').textContent = 'false';
            },
            scrollViewDidScroll(sv) {
                const offset = sv.contentOffset;
                document.getElementById('state-offset').textContent = `x: ${offset.x.toFixed(0)}, y: ${offset.y.toFixed(0)}`;
            }
        };

        scrollView.delegate = scrollDelegate;

        document.getElementById('btn-scroll-top').addEventListener('click', () => {
            scrollView.scrollToTop(true);
        });

        document.getElementById('btn-scroll-bottom').addEventListener('click', () => {
            scrollView.scrollToBottom(true);
        });

        document.getElementById('btn-flash').addEventListener('click', () => {
            scrollView.flashScrollIndicators();
        });

        // Demo 2: Paging
        const section2 = document.createElement('div');
        section2.className = 'section';
        section2.innerHTML = `
            <h2>Paging <span class="tag scroll">Page</span></h2>
            <p class="info">Horizontal paging with snap-to-page behavior. Click page dots or drag.</p>
            <div class="demo-area" style="flex-direction:column;align-items:stretch;">
                <div id="paging-container" style="width:100%;max-width:600px;height:200px;border:2px solid #ddd;border-radius:8px;overflow:hidden;position:relative;background:white;"></div>
                <div class="page-indicator" id="page-indicator" style="display:flex;gap:8px;margin-top:10px;"></div>
            </div>
        `;
        app.appendChild(section2);

        const container2 = document.getElementById('paging-container');
        const pagingScroll = new UIScrollView({ x: 0, y: 0, width: 600, height: 200 });
        pagingScroll.init();
        pagingScroll.contentSize = { width: 1200, height: 200 };
        pagingScroll.pagingEnabled = true;
        pagingScroll.bounces = true;
        pagingScroll.alwaysBounceHorizontal = true;
        container2.appendChild(pagingScroll._element);

        const pageColors = ['#667eea', '#764ba2', '#f093fb', '#f5576c'];
        
        for (let i = 0; i < 4; i++) {
            const page = document.createElement('div');
            page.style.cssText = `
                width: 300px;
                height: 200px;
                position: absolute;
                left: ${i * 300}px;
                top: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 48px;
                font-weight: 700;
                color: white;
                background: ${pageColors[i]};
            `;
            page.textContent = String(i + 1);
            pagingScroll._contentElement.appendChild(page);
        }

        const pageIndicator = document.getElementById('page-indicator');
        for (let i = 0; i < 4; i++) {
            const dot = document.createElement('div');
            dot.style.cssText = `
                width: 10px;
                height: 10px;
                border-radius: 50%;
                background: ${i === 0 ? '#007aff' : '#ccc'};
                cursor: pointer;
                transition: background 0.2s;
            `;
            dot.addEventListener('click', () => {
                pagingScroll.contentOffset = { x: i * 300, y: 0 };
            });
            pageIndicator.appendChild(dot);
        }

        pagingScroll.delegate = {
            scrollViewDidScroll(sv) {
                const page = Math.round(sv.contentOffset.x / 300);
                const dots = pageIndicator.querySelectorAll('div');
                dots.forEach((dot, i) => {
                    dot.style.background = i === page ? '#007aff' : '#ccc';
                });
            }
        };

        // Demo 3: Zoom
        const section3 = document.createElement('div');
        section3.className = 'section';
        section3.innerHTML = `
            <h2>Zoom <span class="tag enhanced">Zoom</span></h2>
            <p class="info">Use Ctrl+Wheel or pinch to zoom. Use buttons to zoom in/out.</p>
            <div class="demo-area">
                <div id="zoom-container" style="width:300px;height:250px;border:2px solid #ddd;border-radius:8px;overflow:hidden;position:relative;background:white;"></div>
                <div>
                    <div class="state-item" style="margin-bottom:10px;">
                        <span class="state-label">Zoom:</span>
                        <span class="state-value" id="zoom-scale">1.0x</span>
                    </div>
                    <button class="btn small" id="btn-zoom-in">Zoom In (+)</button>
                    <button class="btn small" id="btn-zoom-out">Zoom Out (-)</button>
                    <button class="btn green small" id="btn-zoom-reset">Reset</button>
                </div>
            </div>
        `;
        app.appendChild(section3);

        const container3 = document.getElementById('zoom-container');
        const zoomScroll = new UIScrollView({ x: 0, y: 0, width: 300, height: 250 });
        zoomScroll.init();
        zoomScroll.contentSize = { width: 500, height: 400 };
        zoomScroll.minimumZoomScale = 0.5;
        zoomScroll.maximumZoomScale = 3.0;
        zoomScroll.zoomScale = 1.0;
        zoomScroll.bounces = true;
        zoomScroll.showsHorizontalScrollIndicator = false;
        zoomScroll.showsVerticalScrollIndicator = false;
        container3.appendChild(zoomScroll._element);

        const zoomBox = document.createElement('div');
        zoomBox.style.cssText = `
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            font-weight: 600;
            position: absolute;
            left: 150px;
            top: 100px;
        `;
        zoomBox.textContent = 'Zoom Me!';
        zoomScroll._contentElement.appendChild(zoomBox);

        zoomScroll.delegate = {
            scrollViewWillBeginZooming(sv) {
                log('Zoom Begin', 'scroll');
            },
            scrollViewDidZoom(sv) {
                document.getElementById('zoom-scale').textContent = `${sv.zoomScale.toFixed(1)}x`;
            },
            scrollViewDidEndZooming(sv, scale) {
                log(`Zoom End: ${scale.toFixed(2)}x`, 'scroll');
            }
        };

        document.getElementById('btn-zoom-in').addEventListener('click', () => {
            zoomScroll.zoomScale = Math.min(3.0, zoomScroll.zoomScale + 0.25);
        });

        document.getElementById('btn-zoom-out').addEventListener('click', () => {
            zoomScroll.zoomScale = Math.max(0.5, zoomScroll.zoomScale - 0.25);
        });

        document.getElementById('btn-zoom-reset').addEventListener('click', () => {
            zoomScroll.zoomScale = 1.0;
        });

        // Demo 4: Settings-like vertical scroll with bounce
        const section4 = document.createElement('div');
        section4.className = 'section';
        section4.innerHTML = `
            <h2>Settings Panel <span class="tag scroll">Bounce</span></h2>
            <p class="info">Vertical scroll with bounce effect.</p>
            <div class="demo-area" style="flex-direction:column;align-items:stretch;">
                <div id="settings-container" style="width:100%;max-width:400px;height:250px;border:2px solid #ddd;border-radius:8px;overflow:hidden;position:relative;background:white;"></div>
            </div>
        `;
        app.appendChild(section4);

        const container4 = document.getElementById('settings-container');
        const settingsScroll = new UIScrollView({ x: 0, y: 0, width: 400, height: 250 });
        settingsScroll.init();
        settingsScroll.contentSize = { width: 380, height: 500 };
        settingsScroll.bounces = true;
        settingsScroll.alwaysBounceVertical = true;
        container4.appendChild(settingsScroll._element);

        const settings = [
            { icon: '🌙', label: 'Dark Mode' },
            { icon: '🔔', label: 'Notifications' },
            { icon: '📧', label: 'Email' },
            { icon: '🔒', label: 'Privacy' },
            { icon: '🎨', label: 'Appearance' },
            { icon: '🔤', label: 'Language' },
            { icon: '📏', label: 'Units' },
            { icon: '🔄', label: 'Auto-Update' },
            { icon: '💾', label: 'Storage' },
            { icon: '🆘', label: 'Help' },
        ];

        settings.forEach((setting, i) => {
            const row = document.createElement('div');
            row.style.cssText = `
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 15px 10px;
                border-bottom: 1px solid #eee;
                position: absolute;
                width: 100%;
                left: 0;
                top: ${i * 50}px;
                box-sizing: border-box;
            `;
            row.innerHTML = `
                <div style="display:flex;align-items:center;gap:12px;">
                    <span style="font-size:20px;">${setting.icon}</span>
                    <span style="font-size:15px;">${setting.label}</span>
                </div>
                <div style="width:50px;height:30px;background:#34c759;border-radius:15px;"></div>
            `;
            settingsScroll._contentElement.appendChild(row);
        });

        console.log('Enhanced UIScrollView Demo loaded successfully');
    </script>
</body>
</html>
