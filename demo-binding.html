<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UIKit Data Binding - Live Demo</title>
    <style>
        body { margin: 0; }
    </style>
</head>
<body>
    <script type="module">
        import {
            UIView, UIColor, UIFont,
            UILabel, UIButton, UITextField, UISlider,
            UIStackView,
            CurrentValueSubject, AnyCancellable, Binding,
            ObservableObject,
            UIViewController,
            NSLayoutConstraint,
            lazyVar
        } from './src/core/index.js';

        // ────────────────────────────────────────────────────────────
        // MARK: - DemoViewController
        // ────────────────────────────────────────────────────────────

        class DemoBindingViewController extends UIViewController {

            // MARK: - Properties (lazy var)

            get cancellables() { return lazyVar(this, 'cancellables', () => new Set()); }

            get app() {
                return lazyVar(this, 'app', () => {
                    const s = new UIStackView('vertical');
                    s.spacing = 20;
                    s.padding = 20;
                    s.alignment = 'fill';
                    s.translatesAutoresizingMaskIntoConstraints = false;
                    this.view.addSubview(s);
                    NSLayoutConstraint.activateConstraints([
                        s.widthAnchor.constraintLessThanOrEqualToConstant(1200),
                        s.centerXAnchor.constraintEqualToAnchor(this.view.centerXAnchor),
                        s.topAnchor.constraintEqualToAnchor(this.view.topAnchor),
                    ]);
                    return s;
                });
            }

            get contentStack() { return this.app; }

            get count() { return lazyVar(this, 'count', () => new CurrentValueSubject(42)); }
            get source() { return lazyVar(this, 'source', () => new CurrentValueSubject('Hello')); }
            get target() { return lazyVar(this, 'target', () => new CurrentValueSubject('World')); }
            get items() { return lazyVar(this, 'items', () => new CurrentValueSubject(['Apple', 'Banana', 'Cherry'])); }
            get percentage() { return lazyVar(this, 'percentage', () => new CurrentValueSubject(100)); }
            get progressWidth() { return lazyVar(this, 'progressWidth', () => new CurrentValueSubject(0)); }
            get tfValue() { return lazyVar(this, 'tfValue', () => new CurrentValueSubject('Hello')); }
            get sliderValue() { return lazyVar(this, 'sliderValue', () => new CurrentValueSubject(210)); }
            get scaleValue() { return lazyVar(this, 'scaleValue', () => new CurrentValueSubject(1.0)); }

            get tfInput() {
                return lazyVar(this, 'tfInput', () => {
                    const tf = new UITextField('Type something...');
                    tf.font = UIFont.systemFont(14);
                    tf.text = 'Hello';
                    return tf;
                });
            }

            get colorBoxView() {
                return lazyVar(this, 'colorBoxView', () => {
                    const v = new UIStackView('vertical');
                    v.alignment = 'center';
                    v.distribution = 'center';
                    v.frame = { x: 0, y: 0, width: 80, height: 80 };
                    v.layer.cornerRadius = 12;
                    v.backgroundColor = UIColor.colorWithHSB(210 / 360, 1, 1);
                    v.clipsToBounds = true;
                    const lbl = new UILabel('BOX');
                    lbl.font = UIFont.boldSystemFont(12);
                    lbl.textColor = UIColor.white();
                    lbl.textAlignment = 'center';
                    v.addArrangedSubview(lbl);
                    return v;
                });
            }

            get hueSlider() {
                return lazyVar(this, 'hueSlider', () => {
                    const s = new UISlider();
                    s.minimumValue = 0;
                    s.maximumValue = 360;
                    s.value = 210;
                    s.setContentHuggingPriority(1, 'horizontal');
                    return s;
                });
            }

            get scaleSlider() {
                return lazyVar(this, 'scaleSlider', () => {
                    const s = new UISlider();
                    s.minimumValue = 50;
                    s.maximumValue = 150;
                    s.value = 100;
                    return s;
                });
            }

            get person() { return lazyVar(this, 'person', () => new Person('John', 30, 'john@example.com')); }

            get fruitList() {
                return lazyVar(this, 'fruitList', () => {
                    const f = new UIStackView('vertical');
                    f.spacing = 8;
                    f.alignment = 'fill';
                    return f;
                });
            }

            get newItemInput() {
                return lazyVar(this, 'newItemInput', () => {
                    const tf = new UITextField('New item name...');
                    tf.font = UIFont.systemFont(14);
                    return tf;
                });
            }

            get fruits() { return lazyVar(this, 'fruits', () => new CurrentValueSubject(['Apple', 'Banana', 'Cherry', 'Date'])); }
            get dm() { return lazyVar(this, 'dm', () => new DataManager()); }

            // MARK: - Lifecycle

            viewDidLoad() {
                super.viewDidLoad();
                this.view.backgroundColor = UIColor.colorWithHex('#f5f5f7');
                this.setupSubjectDemos();
                this.setupInteractiveDemo();
                this.setupObservableDemo();
                this.setupArrayDemo();
                this.setupLazyVarDemo();
            }

            // MARK: - Factory Methods (private)

            makeSection() {
                const s = new UIStackView('vertical');
                s.spacing = 10;
                s.backgroundColor = UIColor.white();
                s.layer.cornerRadius = 12;
                s.padding = 20;
                s.shadow = { offsetX: 0, offsetY: 2, radius: 8, color: 'rgba(0,0,0,0.08)' };
                return s;
            }

            makeDemoArea(axis = 'vertical') {
                const s = new UIStackView(axis);
                s.spacing = 15;
                s.alignment = 'leading';
                s.backgroundColor = UIColor.colorWithHex('#f5f5f7');
                s.layer.cornerRadius = 8;
                s.padding = 20;
                s.minHeight = 60;
                return s;
            }

            makeLogArea(title) {
                const section = this.makeSection();
                const heading = this.headingLabel(title);
                const logContainer = new UIView();
                logContainer.backgroundColor = UIColor.colorWithHex('#1e1e1e');
                logContainer.layer.cornerRadius = 8;
                logContainer.padding = 15;
                logContainer.maxHeight = '200px';
                logContainer.overflow = 'auto';
                section.addArrangedSubview(heading);
                section.addArrangedSubview(logContainer);
                this.contentStack.addArrangedSubview(section);
                return (msg, type = 'info') => {
                    const entry = new UILabel(`[${new Date().toLocaleTimeString()}] ${msg}`);
                    entry.font = UIFont.monospacedSystemFont(12);
                    entry.textColor = logColorMap[type] || UIColor.colorWithHex('#d4d4d4');
                    entry.numberOfLines = 0;
                    logContainer.addSubview(entry);
                    logContainer.scrollToBottom();
                };
            }

            headingLabel(text) {
                const l = new UILabel(text);
                l.font = UIFont.boldSystemFont(18);
                l.textColor = UIColor.colorWithHex('#1d1d1f');
                return l;
            }

            tagLabel(text, color) {
                const l = new UILabel(text);
                l.font = UIFont.systemFont(11, '600');
                l.textColor = UIColor.white();
                l.backgroundColor = UIColor.colorWithHex(color);
                l.layer.cornerRadius = 4;
                l.padding = { top: 2, left: 8, bottom: 2, right: 8 };
                return l;
            }

            stateLabel(text) {
                const l = new UILabel(text);
                l.font = UIFont.systemFont(12);
                l.textColor = UIColor.colorWithHex('#666666');
                return l;
            }

            valueLabel(text) {
                const l = new UILabel(text);
                l.font = UIFont.monospacedSystemFont(14, '600');
                return l;
            }

            indicator() {
                const v = new UIView({ x: 0, y: 0, width: 10, height: 10 });
                v.layer.cornerRadius = 5;
                v.backgroundColor = UIColor.colorWithHex('#34c759');
                return v;
            }

            makeSectionHeader(title, tagText, tagColor) {
                const h = new UIStackView('horizontal');
                h.spacing = 10;
                h.alignment = 'center';
                h.addArrangedSubview(this.headingLabel(title));
                h.addArrangedSubview(this.tagLabel(tagText, tagColor));
                return h;
            }

            // MARK: - Setup

            setupSubjectDemos() {
                const log1 = this.makeLogArea('CurrentValueSubject Demo');
                const log2 = this.makeLogArea('Two-Way Binding Demo');
                const log3 = this.makeLogArea('Array Demo');
                const log4 = this.makeLogArea('Transform Binding Demo');

                log1('Creating CurrentValueSubject with initial value: 42');
                log1('Calling sink()...');
                const countCancellable = this.count.sink((newValue, oldValue) => {
                    log1(`Value changed: ${oldValue} → ${newValue}`, 'ok');
                }).storeIn(this.cancellables);

                this.count.send(100);
                log1('Sent 100');
                this.count.send(100);
                log1('Sent 100 again (no change expected)');
                this.count.send(50);
                log1('Sent 50');

                countCancellable.cancel();
                log1('Cancelled. Sending 200 (no log expected)');
                this.count.send(200);
                log1(`History: ${JSON.stringify(this.count.changeHistory.map(h => ({from: h.oldValue, to: h.newValue})))}`, 'binding');

                log2('Two-way binding');
                const twoWayBinding = this.source.bindTo(this.target, { twoWay: true });
                twoWayBinding.activate();
                log2(`source="${this.source.value}", target="${this.target.value}"`, 'ok');
                this.source.send('Bonjour');
                log2(`source="${this.source.value}", target="${this.target.value}"`, 'ok');
                this.target.send('Mond');
                log2(`source="${this.source.value}", target="${this.target.value}"`, 'ok');
                twoWayBinding.deactivate();
                this.source.send('Hola');
                log2(`Deactivated. source="${this.source.value}", target="${this.target.value}"`, 'ok');

                const itemsCancellable = this.items.sink((arr) => {
                    log3(`[${arr.join(', ')}]`, 'ok');
                }).storeIn(this.cancellables);
                this.items.send([...this.items.value, 'Date']);
                this.items.send(this.items.value.filter(i => i !== 'Banana'));
                itemsCancellable.cancel();

                const progressBinding = this.percentage.bindTo(this.progressWidth, {
                    twoWay: false, transformTo: (p) => p * 2, transformFrom: (w) => w / 2
                });
                progressBinding.activate();
                log4(`${this.percentage.value}% → ${this.progressWidth.value}px`, 'ok');
                this.percentage.send(75);
                log4(`${this.percentage.value}% → ${this.progressWidth.value}px`, 'ok');
            }

            setupInteractiveDemo() {
                const section = this.makeSection();
                section.addArrangedSubview(this.makeSectionHeader('Interactive Binding Demo', 'Interactive', '#5856d6'));
                this.contentStack.addArrangedSubview(section);

                const demoArea = this.makeDemoArea('vertical');
                section.addArrangedSubview(demoArea);

                const tfValLabel = this.valueLabel('Hello');
                const lblValLabel = this.valueLabel('Hello');
                const hueDesc = this.stateLabel('Hue: 210');
                const slValLabel = this.valueLabel('210');
                const scValLabel = this.valueLabel('1.0');

                const row1 = new UIStackView('horizontal');
                row1.spacing = 20;
                row1.alignment = 'center';
                const tfState = new UIStackView('horizontal');
                tfState.spacing = 8;
                tfState.alignment = 'center';
                tfState.addArrangedSubview(this.stateLabel('TextField:'));
                tfState.addArrangedSubview(tfValLabel);
                tfState.addArrangedSubview(this.indicator());
                const lblState = new UIStackView('horizontal');
                lblState.spacing = 8;
                lblState.alignment = 'center';
                lblState.addArrangedSubview(this.stateLabel('Label:'));
                lblState.addArrangedSubview(lblValLabel);
                lblState.addArrangedSubview(this.indicator());
                row1.addArrangedSubview(tfState);
                row1.addArrangedSubview(lblState);
                demoArea.addArrangedSubview(row1);

                const row2 = new UIStackView('horizontal');
                row2.spacing = 15;
                row2.alignment = 'center';
                row2.addArrangedSubview(this.tfInput);
                row2.addArrangedSubview(this.colorBoxView);
                demoArea.addArrangedSubview(row2);

                const row3 = new UIStackView('horizontal');
                row3.spacing = 15;
                row3.alignment = 'center';
                row3.addArrangedSubview(hueDesc);
                row3.addArrangedSubview(this.hueSlider);
                demoArea.addArrangedSubview(row3);

                const row4 = new UIStackView('horizontal');
                row4.spacing = 20;
                row4.alignment = 'center';
                const slState = new UIStackView('horizontal');
                slState.spacing = 8;
                slState.alignment = 'center';
                slState.addArrangedSubview(this.stateLabel('Slider Value:'));
                slState.addArrangedSubview(slValLabel);
                const scState = new UIStackView('horizontal');
                scState.spacing = 8;
                scState.alignment = 'center';
                scState.addArrangedSubview(this.stateLabel('Box Scale:'));
                scState.addArrangedSubview(scValLabel);
                row4.addArrangedSubview(slState);
                row4.addArrangedSubview(scState);
                row4.addArrangedSubview(this.scaleSlider);
                demoArea.addArrangedSubview(row4);

                this.tfInput.addTarget(this.tfValue, (sender) => { this.tfValue.value = sender.text; });
                this.hueSlider.addTarget(this.sliderValue, (sender) => { this.sliderValue.value = Math.round(sender.value); });
                this.scaleSlider.addTarget(this.scaleValue, (sender) => { this.scaleValue.value = sender.value / 100; });

                this.tfValue.sink((v) => { tfValLabel.text = v; lblValLabel.text = v; }).storeIn(this.cancellables);
                this.sliderValue.sink((v) => {
                    slValLabel.text = String(v);
                    hueDesc.text = `Hue: ${v}`;
                    this.colorBoxView.backgroundColor = UIColor.colorWithHSB(v / 360, 1, 1);
                }).storeIn(this.cancellables);
                this.scaleValue.sink((v) => {
                    scValLabel.text = v.toFixed(1);
                    this.colorBoxView.transform = `scale(${v})`;
                }).storeIn(this.cancellables);
            }

            setupObservableDemo() {
                const section = this.makeSection();
                section.addArrangedSubview(this.makeSectionHeader('ObservableObject + KVO Demo', 'ObservableObject', '#ff9500'));
                this.contentStack.addArrangedSubview(section);

                const demoArea = this.makeDemoArea('vertical');
                section.addArrangedSubview(demoArea);

                const objDisplay = new UIStackView('vertical');
                objDisplay.spacing = 4;
                objDisplay.backgroundColor = UIColor.colorWithHex('#fff3cd');
                objDisplay.layer.cornerRadius = 6;
                objDisplay.layer.borderWidth = 1;
                objDisplay.layer.borderColor = UIColor.colorWithHex('#ffc107');
                objDisplay.padding = 10;
                objDisplay.minHeight = 40;
                const objLabel = new UILabel('ObservableObject State');
                objLabel.font = UIFont.systemFont(11);
                objLabel.textColor = UIColor.colorWithHex('#856404');
                objLabel.numberOfLines = 0;
                const objState = new UILabel('Loading...');
                objState.font = UIFont.monospacedSystemFont(13);
                objState.numberOfLines = 0;
                objDisplay.addArrangedSubview(objLabel);
                objDisplay.addArrangedSubview(objState);
                demoArea.addArrangedSubview(objDisplay);

                const btnRow = new UIStackView('horizontal');
                btnRow.spacing = 15;
                btnRow.alignment = 'center';
                const btnName = new UIButton('Change Name');
                btnName.font = UIFont.systemFont(14, '600');
                const btnAge = new UIButton('Increment Age');
                btnAge.backgroundColor = UIColor.colorWithHex('#34c759');
                btnAge.font = UIFont.systemFont(14, '600');
                const btnEmail = new UIButton('Update Email');
                btnEmail.backgroundColor = UIColor.colorWithHex('#ff9500');
                btnEmail.font = UIFont.systemFont(14, '600');
                const btnReset = new UIButton('Reset All');
                btnReset.backgroundColor = UIColor.colorWithHex('#5856d6');
                btnReset.font = UIFont.systemFont(14, '600');
                btnRow.addArrangedSubview(btnName);
                btnRow.addArrangedSubview(btnAge);
                btnRow.addArrangedSubview(btnEmail);
                btnRow.addArrangedSubview(btnReset);
                demoArea.addArrangedSubview(btnRow);

                const updateDisplay = () => {
                    objState.text = JSON.stringify({
                        name: this.person.name,
                        age: this.person.age,
                        email: this.person.email,
                        displayName: this.person.displayName,
                        vCard: this.person.vCard,
                    }, null, 2);
                };

                updateDisplay();

                btnName.addTarget(() => { this.person.name = this.person.name === 'John' ? 'Jane' : 'John'; updateDisplay(); });
                btnAge.addTarget(() => { this.person.age = this.person.age + 1; updateDisplay(); });
                btnEmail.addTarget(() => { this.person.email = `user${Date.now()}@example.com`; updateDisplay(); });
                btnReset.addTarget(() => { this.person.$unbindAll(); this.person.name = 'John'; this.person.age = 30; this.person.email = 'john@example.com'; updateDisplay(); });
            }

            setupArrayDemo() {
                const section = this.makeSection();
                section.addArrangedSubview(this.makeSectionHeader('Array Demo', 'Interactive', '#ff9500'));
                this.contentStack.addArrangedSubview(section);

                const demoArea = this.makeDemoArea('vertical');
                section.addArrangedSubview(demoArea);

                demoArea.addArrangedSubview(this.fruitList);

                const fruitRow = new UIStackView('horizontal');
                fruitRow.spacing = 15;
                fruitRow.alignment = 'center';
                fruitRow.margin = { top: 15 };
                const btnAdd = new UIButton('Add');
                btnAdd.font = UIFont.systemFont(14, '600');
                const btnRemove = new UIButton('Remove Last');
                btnRemove.backgroundColor = UIColor.colorWithHex('#34c759');
                btnRemove.font = UIFont.systemFont(14, '600');
                const btnClear = new UIButton('Clear All');
                btnClear.backgroundColor = UIColor.colorWithHex('#ff9500');
                btnClear.font = UIFont.systemFont(14, '600');
                fruitRow.addArrangedSubview(this.newItemInput);
                fruitRow.addArrangedSubview(btnAdd);
                fruitRow.addArrangedSubview(btnRemove);
                fruitRow.addArrangedSubview(btnClear);
                demoArea.addArrangedSubview(fruitRow);

                const renderFruits = (arr) => {
                    this.fruitList.removeAllArrangedSubviews();
                    arr.forEach((fruit, index) => {
                        const item = new UIStackView('vertical');
                        item.spacing = 2;
                        item.backgroundColor = UIColor.colorWithHex('#f0f0f0');
                        item.padding = { top: 12, left: 16, bottom: 12, right: 16 };
                        item.layer.cornerRadius = 8;
                        const title = new UILabel(fruit);
                        title.font = UIFont.systemFont(14, '500');
                        const sub = new UILabel(`Index: ${index}`);
                        sub.font = UIFont.systemFont(12);
                        sub.textColor = UIColor.colorWithHex('#666666');
                        item.addArrangedSubview(title);
                        item.addArrangedSubview(sub);
                        this.fruitList.addArrangedSubview(item);
                    });
                };
                this.fruits.sink((arr) => renderFruits(arr)).storeIn(this.cancellables);

                btnAdd.addTarget(() => {
                    const text = this.newItemInput.text.trim();
                    if (text) { this.fruits.send([...this.fruits.value, text]); this.newItemInput.text = ''; }
                });
                btnRemove.addTarget(() => { const a = [...this.fruits.value]; a.pop(); this.fruits.send(a); });
                btnClear.addTarget(() => { this.fruits.send([]); });
            }

            setupLazyVarDemo() {
                const section = this.makeSection();
                section.addArrangedSubview(this.makeSectionHeader('lazy var Demo', 'lazyVar', '#34c759'));
                this.contentStack.addArrangedSubview(section);

                const demoArea = this.makeDemoArea('vertical');
                section.addArrangedSubview(demoArea);

                const swiftCode = `// Swift
class DataManager {
    lazy var database: Database = {
        print("Opening database...")
        return Database.open()
    }()
    lazy var cache: [String: Any] = [:]
    lazy var tokenizer: Tokenizer = Tokenizer()
}

// JavaScript — same pattern via lazyVar
class DataManager {
    get database() {
        return lazyVar(this, 'database', () => {
            console.log("Opening database...")
            return Database.open()
        })
    }
}`;

                const codeLabel = new UILabel(swiftCode);
                codeLabel.font = UIFont.monospacedSystemFont(11);
                codeLabel.textColor = UIColor.colorWithHex('#6a9955');
                codeLabel.numberOfLines = 0;
                demoArea.addArrangedSubview(codeLabel);

                const lazyStateLabel = new UILabel('No lazy vars initialized yet');
                lazyStateLabel.font = UIFont.monospacedSystemFont(13);
                lazyStateLabel.numberOfLines = 0;
                demoArea.addArrangedSubview(lazyStateLabel);

                const lazyCountLabel = new UILabel('Initializations: database=0  cache=0  tokenizer=0');
                lazyCountLabel.font = UIFont.systemFont(12);
                lazyCountLabel.textColor = UIColor.colorWithHex('#888');
                lazyCountLabel.numberOfLines = 0;
                demoArea.addArrangedSubview(lazyCountLabel);

                const updateLazyUI = () => {
                    const c = this.dm.initCount;
                    lazyCountLabel.text = `Initializations: database=${c.database}  cache=${c.cache}  tokenizer=${c.tokenizer}`;
                };

                const lazyBtnRow = new UIStackView('horizontal');
                lazyBtnRow.spacing = 15;
                lazyBtnRow.alignment = 'center';
                const btnDb = new UIButton('Access database');
                btnDb.font = UIFont.systemFont(14, '600');
                const btnCache = new UIButton('Access cache');
                btnCache.backgroundColor = UIColor.colorWithHex('#34c759');
                btnCache.font = UIFont.systemFont(14, '600');
                const btnToken = new UIButton('Access tokenizer');
                btnToken.backgroundColor = UIColor.colorWithHex('#ff9500');
                btnToken.font = UIFont.systemFont(14, '600');
                const btnQuery = new UIButton('Run Query');
                btnQuery.backgroundColor = UIColor.colorWithHex('#5856d6');
                btnQuery.font = UIFont.systemFont(14, '600');
                lazyBtnRow.addArrangedSubview(btnDb);
                lazyBtnRow.addArrangedSubview(btnCache);
                lazyBtnRow.addArrangedSubview(btnToken);
                lazyBtnRow.addArrangedSubview(btnQuery);
                demoArea.addArrangedSubview(lazyBtnRow);

                btnDb.addTarget(() => {
                    const db = this.dm.database;
                    lazyStateLabel.text = `database = ${JSON.stringify({ connected: db.connected, id: db.id })}\n${this.dm.initCount.database === 1 ? 'First access — computed and cached' : 'Cached — plain property read'}`;
                    updateLazyUI();
                });
                btnCache.addTarget(() => {
                    this.dm.cache['key_' + Date.now().toString(36)] = true;
                    lazyStateLabel.text = `cache = ${JSON.stringify(this.dm.cache)}\n${this.dm.initCount.cache === 1 ? 'Initialized — now mutable' : 'Cached — same object mutated in place'}`;
                    updateLazyUI();
                });
                btnToken.addTarget(() => {
                    const t = this.dm.tokenizer;
                    lazyStateLabel.text = `tokenizer = ${JSON.stringify({ ready: t.ready, tokens: t.tokens.size })}\n${this.dm.initCount.tokenizer === 1 ? 'First access — expensive object created once' : 'Cached — same instance returned'}`;
                    updateLazyUI();
                });
                btnQuery.addTarget(() => {
                    this.dm.database.queries.push(`SELECT * FROM users WHERE id = ${this.dm.database.queries.length}`);
                    lazyStateLabel.text = `database.queries = ${JSON.stringify(this.dm.database.queries)}\nUsing cached database — ${this.dm.initCount.database} init (should stay 1)`;
                    updateLazyUI();
                });
            }
        }

        // ────────────────────────────────────────────────────────────
        // MARK: - Person
        // ────────────────────────────────────────────────────────────

        class Person extends ObservableObject {
            constructor(name, age, email) {
                super();
                this._name = name;
                this._age = age;
                this._email = email;
            }
            get name() { return this._name; }
            set name(v) { this.willChangeValue('name'); this._name = v; this.$set('name', v); this.didChangeValue('name'); }
            get age() { return this._age; }
            set age(v) { this.willChangeValue('age'); this._age = v; this.$set('age', v); this.didChangeValue('age'); }
            get email() { return this._email; }
            set email(v) { this.willChangeValue('email'); this._email = v; this.$set('email', v); this.didChangeValue('email'); }
            get displayName() { return `${this._name} (age ${this._age})`; }

            get vCard() {
                return lazyVar(this, 'vCard', () => `BEGIN:VCARD\nFN:${this._name}\nEMAIL:${this._email}\nEND:VCARD`);
            }
        }

        // ────────────────────────────────────────────────────────────
        // MARK: - DataManager
        // ────────────────────────────────────────────────────────────

        class DataManager {
            constructor() {
                this.initCount = { database: 0, cache: 0, tokenizer: 0 };
            }

            get database() {
                return lazyVar(this, 'database', () => {
                    this.initCount.database++;
                    return { connected: true, id: Date.now(), queries: [] };
                });
            }

            get cache() {
                return lazyVar(this, 'cache', () => {
                    this.initCount.cache++;
                    return {};
                });
            }

            get tokenizer() {
                return lazyVar(this, 'tokenizer', () => {
                    this.initCount.tokenizer++;
                    return { tokens: new Map(), ready: true };
                });
            }
        }

        // ────────────────────────────────────────────────────────────
        // MARK: - Constants
