<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UIKit Components Demo</title>
    <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
    <div id="rootView"></div>

    <script type="module">
        import { 
            UIScrollView, UIView, UILabel, UIButton, UITextField, UITextView,
            UISwitch, UISlider, UIStepper, UISegmentedControl, UIDatePicker,
            UIStackView, UIProgressView, UIActivityIndicatorView, UIPageControl,
            UIColor
        } from './src/core/index.js';

        class DemoViewController {
            constructor() {
                this.rootView = new UIView();
                this.rootView.init();
                this.rootView.setFrame(0, 0, window.innerWidth, window.innerHeight);
                this.rootView.backgroundColor = UIColor.white();
                document.getElementById('rootView').appendChild(this.rootView.element);

                this.scrollView = new UIScrollView();
                this.scrollView.init();
                this.scrollView.setFrame(0, 0, window.innerWidth, window.innerHeight);
                this.scrollView.backgroundColor = UIColor.colorWithWhiteAlpha(0.97, 1);
                this.scrollView.setShowsVerticalScrollIndicator(true);
                this.rootView.addSubview(this.scrollView);

                this.setupComponents();
            }

            setupComponents() {
                let yOffset = 20;
                const padding = 20;
                const contentWidth = window.innerWidth - padding * 2;

                yOffset = this.addSection('UITextField', [this.createTextFieldDemos()], yOffset, padding, contentWidth);
                yOffset = this.addSection('UITextView', [this.createTextViewDemos()], yOffset, padding, contentWidth);
                yOffset = this.addSection('UISwitch', [this.createSwitchDemos()], yOffset, padding, contentWidth);
                yOffset = this.addSection('UISlider', [this.createSliderDemos()], yOffset, padding, contentWidth);
                yOffset = this.addSection('UIStepper', [this.createStepperDemos()], yOffset, padding, contentWidth);
                yOffset = this.addSection('UISegmentedControl', [this.createSegmentedDemos()], yOffset, padding, contentWidth);
                yOffset = this.addSection('UIDatePicker', [this.createDatePickerDemos()], yOffset, padding, contentWidth);
                yOffset = this.addSection('UIStackView', [this.createStackViewDemos()], yOffset, padding, contentWidth);
                yOffset = this.addSection('UIProgressView', [this.createProgressDemos()], yOffset, padding, contentWidth);
                yOffset = this.addSection('UIActivityIndicatorView', [this.createActivityDemos()], yOffset, padding, contentWidth);
                yOffset = this.addSection('UIPageControl', [this.createPageControlDemos()], yOffset, padding, contentWidth);

                this.scrollView.setContentSize(contentWidth, yOffset + 40);
            }

            addSection(title, views, yOffset, padding, contentWidth) {
                const sectionView = new UIView();
                sectionView.init();
                sectionView.setFrame(padding, yOffset, contentWidth, this.calculateSectionHeight(views));
                sectionView.backgroundColor = UIColor.white();
                sectionView.element.style.borderRadius = '12px';
                sectionView.element.style.boxShadow = '0 2px 8px rgba(0,0,0,0.1)';

                const header = new UILabel(title);
                header.init();
                header.setFrame(20, 16, contentWidth - 40, 24);
                header.setFontSize(18);
                header.setFontWeight('bold');
                header.setTextColor(UIColor.black());
                sectionView.addSubview(header);

                const separator = new UIView();
                separator.init();
                separator.setFrame(20, 48, contentWidth - 40, 2);
                separator.backgroundColor = UIColor.systemBlue();
                sectionView.addSubview(separator);

                let componentY = 64;
                views.forEach(comp => {
                    comp.setFrame(20, componentY, contentWidth - 40, comp.frame.height);
                    sectionView.addSubview(comp);
                    componentY += comp.frame.height + 12;
                });

                this.scrollView.addSubview(sectionView);
                return yOffset + sectionView.frame.height + 24;
            }

            calculateSectionHeight(views) {
                let height = 64;
                views.forEach(v => height += v.frame.height + 12);
                return height;
            }

            createTextFieldDemos() {
                const container = new UIView();
                container.init();
                container.setFrame(0, 0, 300, 120);

                const nameField = new UITextField('Enter your name');
                nameField.init();
                nameField.setFrame(0, 0, 260, 36);
                nameField.setBorderStyle('rounded');
                container.addSubview(nameField);

                const emailField = new UITextField('email@example.com');
                emailField.init();
                emailField.setFrame(0, 44, 260, 36);
                emailField.setKeyboardType('emailAddress');
                emailField.setBorderStyle('rounded');
                container.addSubview(emailField);

                const passwordField = new UITextField('Password');
                passwordField.init();
                passwordField.setFrame(0, 88, 260, 36);
                passwordField.setSecureTextEntry(true);
                passwordField.setBorderStyle('rounded');
                container.addSubview(passwordField);

                return container;
            }

            createTextViewDemos() {
                const container = new UIView();
                container.init();
                container.setFrame(0, 0, 300, 140);

                const textView = new UITextView('This is a multi-line text view...');
                textView.init();
                textView.setFrame(0, 0, 300, 120);
                textView.setEditable(true);
                container.addSubview(textView);

                return container;
            }

            createSwitchDemos() {
                const container = new UIView();
                container.init();
                container.setFrame(0, 0, 300, 80);

                const notifSwitch = new UISwitch();
                notifSwitch.init();
                notifSwitch.setFrame(0, 10, 50, 30);
                notifSwitch.setOnTintColor(UIColor.systemGreen());
                container.addSubview(notifSwitch);

                const notifLabel = new UILabel('Notifications');
                notifLabel.init();
                notifLabel.setFrame(58, 10, 120, 30);
                notifLabel.setFontSize(14);
                notifLabel.setTextColor(UIColor.black());
                notifLabel.element.style.lineHeight = '30px';
                container.addSubview(notifLabel);

                const darkSwitch = new UISwitch();
                darkSwitch.init();
                darkSwitch.setFrame(0, 45, 50, 30);
                darkSwitch.setOnTintColor(UIColor.systemIndigo());
                container.addSubview(darkSwitch);

                const darkLabel = new UILabel('Dark Mode');
                darkLabel.init();
                darkLabel.setFrame(58, 45, 120, 30);
                darkLabel.setFontSize(14);
                darkLabel.setTextColor(UIColor.black());
                darkLabel.element.style.lineHeight = '30px';
                container.addSubview(darkLabel);

                return container;
            }

            createSliderDemos() {
                const container = new UIView();
                container.init();
                container.setFrame(0, 0, 300, 90);

                const volumeSlider = new UISlider();
                volumeSlider.init();
                volumeSlider.setFrame(0, 8, 220, 30);
                volumeSlider.setValue(0.5);
                volumeSlider.setMinimumTrackTintColor(UIColor.systemBlue());
                container.addSubview(volumeSlider);

                const volumeLabel = new UILabel('50%');
                volumeLabel.init();
                volumeLabel.setFrame(230, 12, 50, 24);
                volumeLabel.setFontSize(14);
                volumeLabel.setTextColor(UIColor.gray());
                container.addSubview(volumeLabel);

                const brightSlider = new UISlider();
                brightSlider.init();
                brightSlider.setFrame(0, 50, 220, 30);
                brightSlider.setValue(0.5);
                brightSlider.setMinimumTrackTintColor(UIColor.systemYellow());
                container.addSubview(brightSlider);

                const brightLabel = new UILabel('50%');
                brightLabel.init();
                brightLabel.setFrame(230, 54, 50, 24);
                brightLabel.setFontSize(14);
                brightLabel.setTextColor(UIColor.gray());
                container.addSubview(brightLabel);

                return container;
            }

            createStepperDemos() {
                const container = new UIView();
                container.init();
                container.setFrame(0, 0, 300, 90);

                const qtyStepper = new UIStepper();
                qtyStepper.init();
                qtyStepper.setFrame(0, 8, 120, 36);
                qtyStepper.setMinimumValue(0);
                qtyStepper.setMaximumValue(100);
                qtyStepper.setStepValue(1);
                container.addSubview(qtyStepper);

                const qtyLabel = new UILabel('Quantity: 0');
                qtyLabel.init();
                qtyLabel.setFrame(130, 12, 100, 24);
                qtyLabel.setFontSize(14);
                qtyLabel.setTextColor(UIColor.black());
                container.addSubview(qtyLabel);

                const tempStepper = new UIStepper();
                tempStepper.init();
                tempStepper.setFrame(0, 52, 120, 36);
                tempStepper.setMinimumValue(32);
                tempStepper.setMaximumValue(120);
                tempStepper.setStepValue(1);
                tempStepper.setValue(72);
                container.addSubview(tempStepper);

                const tempLabel = new UILabel('Temperature: 72°F');
                tempLabel.init();
                tempLabel.setFrame(130, 56, 120, 24);
                tempLabel.setFontSize(14);
                tempLabel.setTextColor(UIColor.black());
                container.addSubview(tempLabel);

                return container;
            }

            createSegmentedDemos() {
                const container = new UIView();
                container.init();
                container.setFrame(0, 0, 300, 100);

                const sizeSegment = new UISegmentedControl(['S', 'M', 'L', 'XL']);
                sizeSegment.init();
                sizeSegment.setFrame(0, 8, 280, 36);
                sizeSegment.setTintColor(UIColor.systemBlue());
                container.addSubview(sizeSegment);

                const colorSegment = new UISegmentedControl(['Blue', 'Green', 'Orange']);
                colorSegment.init();
                colorSegment.setFrame(0, 52, 280, 36);
                colorSegment.setTintColor(UIColor.systemBlue());
                container.addSubview(colorSegment);

                return container;
            }

            createDatePickerDemos() {
                const container = new UIView();
                container.init();
                container.setFrame(0, 0, 300, 200);

                const datePicker = new UIDatePicker();
                datePicker.init();
                datePicker.setFrame(0, 10, 300, 180);
                datePicker.setDatePickerMode('date');
                datePicker.setDate(new Date());
                container.addSubview(datePicker);

                return container;
            }

            createStackViewDemos() {
                const container = new UIView();
                container.init();
                container.setFrame(0, 0, 300, 180);

                const hStack = new UIStackView();
                hStack.init();
                hStack.setFrame(0, 0, 280, 50);
                hStack.setAxis('horizontal');
                hStack.setDistribution('fillEqually');
                hStack.setSpacing(8);
                hStack.backgroundColor = UIColor.colorWithWhiteAlpha(0.95, 1);
                hStack.element.style.borderRadius = '8px';
                hStack.element.style.padding = '8px';

                for (let i = 0; i < 3; i++) {
                    const box = new UILabel('Item ' + (i + 1));
                    box.init();
                    box.setFrame(0, 0, 80, 34);
                    box.setTextAlignment('center');
                    box.setBackgroundColor(UIColor.colorWithHex(['#ff6b6b', '#4ecdc4', '#45b7d1'][i]));
                    box.setTextColor(UIColor.white());
                    box.element.style.borderRadius = '6px';
                    hStack.addArrangedSubview(box);
                }
                container.addSubview(hStack);

                const vStack = new UIStackView();
                vStack.init();
                vStack.setFrame(0, 60, 280, 120);
                vStack.setAxis('vertical');
                vStack.setDistribution('fillEqually');
                vStack.setSpacing(8);
                vStack.setAlignment('fill');
                vStack.backgroundColor = UIColor.colorWithWhiteAlpha(0.95, 1);
                vStack.element.style.borderRadius = '8px';
                vStack.element.style.padding = '8px';

                for (let i = 0; i < 3; i++) {
                    const box = new UILabel('Row ' + (i + 1));
                    box.init();
                    box.setFrame(0, 0, 264, 32);
                    box.setTextAlignment('center');
                    box.setBackgroundColor(UIColor.colorWithHex(`hsl(${i * 60}, 70%, 60%)`));
                    box.setTextColor(UIColor.white());
                    box.element.style.borderRadius = '6px';
                    vStack.addArrangedSubview(box);
                }
                container.addSubview(vStack);

                return container;
            }

            createProgressDemos() {
                const container = new UIView();
                container.init();
                container.setFrame(0, 0, 300, 80);

                const progressView = new UIProgressView();
                progressView.init();
                progressView.setFrame(0, 8, 220, 20);
                progressView.setProgressTintColor(UIColor.systemGreen());
                progressView.setTrackTintColor(UIColor.lightGray());
                container.addSubview(progressView);

                const percentLabel = new UILabel('0%');
                percentLabel.init();
                percentLabel.setFrame(230, 8, 50, 20);
                percentLabel.setFontSize(14);
                percentLabel.setTextColor(UIColor.gray());
                container.addSubview(percentLabel);

                const startButton = new UIButton('Start');
                startButton.init();
                startButton.setFrame(0, 40, 80, 32);
                startButton.setBackgroundColor(UIColor.systemBlue());
                startButton.setTitleColor(UIColor.white());
                startButton.element.style.borderRadius = '6px';
                container.addSubview(startButton);

                const resetButton = new UIButton('Reset');
                resetButton.init();
                resetButton.setFrame(90, 40, 80, 32);
                resetButton.setBackgroundColor(UIColor.gray());
                resetButton.setTitleColor(UIColor.white());
                resetButton.element.style.borderRadius = '6px';
                container.addSubview(resetButton);

                let progressInterval = null;

                startButton.addTarget({
                    onStartProgress: () => {
                        if (progressInterval) return;
                        progressInterval = setInterval(() => {
                            let current = progressView.progress;
                            if (current >= 1) {
                                clearInterval(progressInterval);
                                progressInterval = null;
                                startButton.setTitle('Start');
                                return;
                            }
                            progressView.setProgress(current + 0.1, true);
                            percentLabel.setText(Math.round(progressView.progress * 100) + '%');
                        }, 200);
                    }
                }, 'onStartProgress', 'click');

                resetButton.addTarget({
                    onResetProgress: () => {
                        if (progressInterval) {
                            clearInterval(progressInterval);
                            progressInterval = null;
                        }
                        progressView.setProgress(0);
                        percentLabel.setText('0%');
                    }
                }, 'onResetProgress', 'click');

                return container;
            }

            createActivityDemos() {
                const container = new UIView();
                container.init();
                container.setFrame(0, 0, 300, 70);

                const indicator = new UIActivityIndicatorView();
                indicator.init();
                indicator.setFrame(0, 10, 40, 40);
                indicator.setStyle('large');
                indicator.setColor(UIColor.systemBlue());
                indicator.startAnimating();
                container.addSubview(indicator);

                const toggleButton = new UIButton('Stop');
                toggleButton.init();
                toggleButton.setFrame(50, 15, 80, 32);
                toggleButton.setBackgroundColor(UIColor.systemBlue());
                toggleButton.setTitleColor(UIColor.white());
                toggleButton.element.style.borderRadius = '6px';
                container.addSubview(toggleButton);

                let isAnimating = true;

                toggleButton.addTarget({
                    onToggleActivity: () => {
                        if (isAnimating) {
                            indicator.stopAnimating();
                            toggleButton.setTitle('Start');
                        } else {
                            indicator.startAnimating();
                            toggleButton.setTitle('Stop');
                        }
                        isAnimating = !isAnimating;
                    }
                }, 'onToggleActivity', 'click');

                return container;
            }

            createPageControlDemos() {
                const container = new UIView();
                container.init();
                container.setFrame(0, 0, 300, 70);

                const pageControl = new UIPageControl();
                pageControl.init();
                pageControl.setFrame(0, 8, 150, 30);
                pageControl.setNumberOfPages(5);
                pageControl.setCurrentPage(0);
                pageControl.setPageIndicatorTintColor(UIColor.lightGray());
                pageControl.setCurrentPageIndicatorTintColor(UIColor.systemBlue());
                container.addSubview(pageControl);

                const prevButton = new UIButton('Prev');
                prevButton.init();
                prevButton.setFrame(160, 8, 60, 30);
                prevButton.setBackgroundColor(UIColor.gray());
                prevButton.setTitleColor(UIColor.white());
                prevButton.element.style.borderRadius = '4px';
                prevButton.element.style.fontSize = '12px';
                container.addSubview(prevButton);

                const nextButton = new UIButton('Next');
                nextButton.init();
                nextButton.setFrame(230, 8, 60, 30);
                nextButton.setBackgroundColor(UIColor.gray());
                nextButton.setTitleColor(UIColor.white());
                nextButton.element.style.borderRadius = '4px';
                nextButton.element.style.fontSize = '12px';
                container.addSubview(nextButton);

                prevButton.addTarget({
                    onPrevPage: () => {
                        let current = pageControl.currentPage;
                        if (current > 0) {
                            pageControl.setCurrentPage(current - 1);
                        }
                    }
                }, 'onPrevPage', 'click');

                nextButton.addTarget({
                    onNextPage: () => {
                        let current = pageControl.currentPage;
                        if (current < pageControl.numberOfPages - 1) {
                            pageControl.setCurrentPage(current + 1);
                        }
                    }
                }, 'onNextPage', 'click');

                return container;
            }
        }

        new DemoViewController();
    </script>
</body>
</html>
