<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UIKit TextField Demo</title>
    <link rel="stylesheet" href="./styles/main.css">
    <link rel="stylesheet" href="./styles/controls.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f5f7;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        .demo-container {
            max-width: 400px;
            margin: 0 auto;
        }
        .demo-title {
            font-size: 28px;
            font-weight: 700;
            color: #1d1d1f;
            margin-bottom: 8px;
            text-align: center;
        }
        .demo-subtitle {
            font-size: 14px;
            color: #86868b;
            margin-bottom: 24px;
            text-align: center;
        }
        .section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: #86868b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }
        .text-field-row {
            margin-bottom: 12px;
        }
        .text-field-row:last-child {
            margin-bottom: 0;
        }
        .label {
            font-size: 12px;
            color: #1d1d1f;
            margin-bottom: 6px;
        }
        .status-bar {
            background: #1d1d1f;
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-family: 'SF Mono', Monaco, monospace;
            margin-top: 16px;
        }
        .status-bar span {
            color: #86868b;
        }
        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        .btn {
            flex: 1;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #007aff;
            color: white;
        }
        .btn-primary:hover {
            background: #0056cc;
        }
        .btn-secondary {
            background: #e5e5ea;
            color: #1d1d1f;
        }
        .btn-secondary:hover {
            background: #d1d1d6;
        }
        .checkbox-row, .radio-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }
        .checkbox, .radio {
            width: 22px;
            height: 22px;
            margin-right: 12px;
            cursor: pointer;
        }
        .checkbox-label, .radio-label {
            font-size: 15px;
            color: #1d1d1f;
        }
        .switch-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .switch-label {
            font-size: 15px;
            color: #1d1d1f;
        }
    </style>
</head>
<body>
    <div id="rootView"></div>

    <script type="module">
        import { 
            UIView, UILabel, UITextField, UITextView,
            UIButton, UISwitch, UISlider, UISegmentedControl,
            UIColor, UIStackView, UIProgressView
        } from './src/core/index.js';

        class DemoViewController {
            constructor() {
                this.rootView = new UIView();
                this.rootView.init();
                this.rootView.frame = { x: 0, y: 0, width: window.innerWidth, height: window.innerHeight };
                this.rootView.backgroundColor = UIColor.colorWithRedGreenBlueAlpha(245/255, 245/255, 247/255, 1);
                document.getElementById('rootView').appendChild(this.rootView.element);

                this.setupUI();
                this.updateStatus();
            }

            setupUI() {
                const container = new UIView();
                container.init();
                container.frame = { x: 20, y: 20, width: window.innerWidth - 40, height: 20 };
                container.backgroundColor = UIColor.white();
                this.rootView.addSubview(container);

                this.createFormSection();
                this.createOptionsSection();
                this.createActionsSection();
            }

            createFormSection() {
                const section = new UIView();
                section.init();
                section.frame = { x: 20, y: 60, width: window.innerWidth - 40, height: 420 };
                section.backgroundColor = UIColor.white();
                section.cornerRadius = 12;
                section.element.style.boxShadow = '0 2px 8px rgba(0,0,0,0.08)';
                this.rootView.addSubview(section);

                const title = new UILabel('Form Inputs');
                title.init();
                title.frame = { x: 20, y: 20, width: 200, height: 20 };
                title.fontSize = 13;
                title.fontWeight = 'bold';
                title.textColor = UIColor.colorWithRedGreenBlueAlpha(134/255, 134/255, 139/255, 1);
                section.addSubview(title);

                this.nameField = new UITextField('Full Name');
                this.nameField.init();
                this.nameField.frame = { x: 20, y: 56, width: section.frame.width - 40, height: 44 };
                this.nameField.borderStyle = 'rounded';
                this.nameField.element.style.marginBottom = '12px';
                section.addSubview(this.nameField);

                this.emailField = new UITextField('email@example.com');
                this.emailField.init();
                this.emailField.frame = { x: 20, y: 112, width: section.frame.width - 40, height: 44 };
                this.emailField.borderStyle = 'rounded';
                this.emailField.keyboardType = 'emailAddress';
                this.emailField.element.style.marginBottom = '12px';
                section.addSubview(this.emailField);

                this.passwordField = new UITextField('Password');
                this.passwordField.init();
                this.passwordField.frame = { x: 20, y: 168, width: section.frame.width - 40, height: 44 };
                this.passwordField.borderStyle = 'rounded';
                this.passwordField.isSecureTextEntry = true;
                this.passwordField.element.style.marginBottom = '12px';
                section.addSubview(this.passwordField);

                this.phoneField = new UITextField('Phone Number');
                this.phoneField.init();
                this.phoneField.frame = { x: 20, y: 224, width: section.frame.width - 40, height: 44 };
                this.phoneField.borderStyle = 'rounded';
                this.phoneField.keyboardType = 'phonePad';
                section.addSubview(this.phoneField);

                this.statusLabel = new UILabel('');
                this.statusLabel.init();
                this.statusLabel.frame = { x: 20, y: 284, width: section.frame.width - 40, height: 60 };
                this.statusLabel.fontSize = 12;
                this.statusLabel.numberOfLines = 4;
                this.statusLabel.textColor = UIColor.gray();
                this.statusLabel.element.style.fontFamily = "'SF Mono', Monaco, monospace";
                section.addSubview(this.statusLabel);

                this.clearBtn = new UIButton('Clear All');
                this.clearBtn.init();
                this.clearBtn.frame = { x: 20, y: 356, width: section.frame.width - 40, height: 44 };
                this.clearBtn.backgroundColor = UIColor.colorWithRedGreenBlueAlpha(229/255, 229/255, 234/255, 1);
                this.clearBtn.setTitleColor(UIColor.colorWithRedGreenBlueAlpha(29/255, 29/255, 31/255, 1));
                this.clearBtn.element.style.borderRadius = '10px';
                this.clearBtn.addTarget({
                    onTap: () => this.clearFields()
                }, 'onTap', 'touchUpInside');
                section.addSubview(this.clearBtn);
            }

            createOptionsSection() {
                const section = new UIView();
                section.init();
                section.frame = { x: 20, y: 500, width: window.innerWidth - 40, height: 200 };
                section.backgroundColor = UIColor.white();
                section.cornerRadius = 12;
                section.element.style.boxShadow = '0 2px 8px rgba(0,0,0,0.08)';
                this.rootView.addSubview(section);

                const title = new UILabel('Options');
                title.init();
                title.frame = { x: 20, y: 20, width: 200, height: 20 };
                title.fontSize = 13;
                title.fontWeight = 'bold';
                title.textColor = UIColor.colorWithRedGreenBlueAlpha(134/255, 134/255, 139/255, 1);
                section.addSubview(title);

                this.rememberMeSwitch = new UISwitch();
                this.rememberMeSwitch.init();
                this.rememberMeSwitch.frame = { x: section.frame.width - 80, y: 50, width: 50, height: 30 };
                this.rememberMeSwitch.setOn(false);
                section.addSubview(this.rememberMeSwitch);

                const rememberLabel = new UILabel('Remember Me');
                rememberLabel.init();
                rememberLabel.frame = { x: 20, y: 50, width: 150, height: 30 };
                rememberLabel.fontSize = 15;
                rememberLabel.textColor = UIColor.black();
                section.addSubview(rememberLabel);

                this.showPasswordSwitch = new UISwitch();
                this.showPasswordSwitch.init();
                this.showPasswordSwitch.frame = { x: section.frame.width - 80, y: 96, width: 50, height: 30 };
                this.showPasswordSwitch.setOn(false);
                this.showPasswordSwitch.addTarget({
                    onToggle: () => this.togglePasswordVisibility()
                }, 'onToggle', 'valueChanged');
                section.addSubview(this.showPasswordSwitch);

                const showPassLabel = new UILabel('Show Password');
                showPassLabel.init();
                showPassLabel.frame = { x: 20, y: 96, width: 150, height: 30 };
                showPassLabel.fontSize = 15;
                showPassLabel.textColor = UIColor.black();
                section.addSubview(showPassLabel);

                this.autoCapitalizeSegment = new UISegmentedControl(['None', 'Words', 'All']);
                this.autoCapitalizeSegment.init();
                this.autoCapitalizeSegment.frame = { x: 20, y: 144, width: section.frame.width - 40, height: 36 };
                this.autoCapitalizeSegment.selectedSegmentIndex = 1;
                section.addSubview(this.autoCapitalizeSegment);
            }

            createActionsSection() {
                const section = new UIView();
                section.init();
                section.frame = { x: 20, y: 720, width: window.innerWidth - 40, height: 140 };
                section.backgroundColor = UIColor.white();
                section.cornerRadius = 12;
                section.element.style.boxShadow = '0 2px 8px rgba(0,0,0,0.08)';
                this.rootView.addSubview(section);

                this.submitBtn = new UIButton('Submit');
                this.submitBtn.init();
                this.submitBtn.frame = { x: 20, y: 20, width: section.frame.width - 40, height: 50 };
                this.submitBtn.backgroundColor = UIColor.systemBlue();
                this.submitBtn.setTitleColor(UIColor.white());
                this.submitBtn.element.style.borderRadius = '10px';
                this.submitBtn.addTarget({
                    onTap: () => this.submitForm()
                }, 'onTap', 'touchUpInside');
                section.addSubview(this.submitBtn);

                this.validateBtn = new UIButton('Validate');
                this.validateBtn.init();
                this.validateBtn.frame = { x: 20, y: 80, width: (section.frame.width - 52) / 2, height: 44 };
                this.validateBtn.backgroundColor = UIColor.colorWithRedGreenBlueAlpha(48/255, 209/255, 88/255, 1);
                this.validateBtn.setTitleColor(UIColor.white());
                this.validateBtn.element.style.borderRadius = '10px';
                this.validateBtn.addTarget({
                    onTap: () => this.validateForm()
                }, 'onTap', 'touchUpInside');
                section.addSubview(this.validateBtn);

                this.cancelBtn = new UIButton('Cancel');
                this.cancelBtn.init();
                this.cancelBtn.frame = { x: 32 + (section.frame.width - 52) / 2, y: 80, width: (section.frame.width - 52) / 2, height: 44 };
                this.cancelBtn.backgroundColor = UIColor.colorWithRedGreenBlueAlpha(255/255, 59/255, 48/255, 1);
                this.cancelBtn.setTitleColor(UIColor.white());
                this.cancelBtn.element.style.borderRadius = '10px';
                this.cancelBtn.addTarget({
                    onTap: () => this.cancelForm()
                }, 'onTap', 'touchUpInside');
                section.addSubview(this.cancelBtn);
            }

            updateStatus() {
                const name = this.nameField?.getText() || '';
                const email = this.emailField?.getText() || '';
                const hasPassword = this.passwordField?.getText()?.length > 0;

                let status = `<span>name:</span> "${name}"\n`;
                status += `<span>email:</span> "${email}"\n`;
                status += `<span>password:</span> ${hasPassword ? '***' : '(empty)'}`;

                this.statusLabel.text = status;
            }

            clearFields() {
                this.nameField.setText('');
                this.emailField.setText('');
                this.passwordField.setText('');
                this.phoneField.setText('');
                this.updateStatus();
            }

            togglePasswordVisibility() {
                const isOn = this.showPasswordSwitch.isOn;
                this.passwordField.isSecureTextEntry = !isOn;
            }

            submitForm() {
                const name = this.nameField.getText();
                const email = this.emailField.getText();
                const password = this.passwordField.getText();

                if (!name || !email || !password) {
                    alert('Please fill in all fields');
                    return;
                }

                if (!this.isValidEmail(email)) {
                    alert('Please enter a valid email address');
                    return;
                }

                alert(`Form Submitted!\n\nName: ${name}\nEmail: ${email}`);
            }

            validateForm() {
                const name = this.nameField.getText();
                const email = this.emailField.getText();
                const password = this.passwordField.getText();

                let errors = [];

                if (!name) errors.push('Name is required');
                if (!email) errors.push('Email is required');
                else if (!this.isValidEmail(email)) errors.push('Email is invalid');
                if (!password) errors.push('Password is required');
                else if (password.length < 8) errors.push('Password must be at least 8 characters');

                if (errors.length > 0) {
                    alert('Validation Errors:\n• ' + errors.join('\n• '));
                } else {
                    alert('All fields are valid!');
                }
            }

            cancelForm() {
                if (confirm('Are you sure you want to cancel?')) {
                    this.clearFields();
                }
            }

            isValidEmail(email) {
                return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
            }
        }

        const controller = new DemoViewController();
        window.controller = controller;
    </script>
</body>
</html>
