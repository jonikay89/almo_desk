<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UIKit Data Binding - Live Demo</title>
    <style>
        body { margin: 0; }
    </style>
</head>
<body>
    <script type="module">
        import {
            UIView, UIColor, UIFont,
            UILabel, UIButton, UITextField, UISlider,
            UIStackView,
            CurrentValueSubject, AnyCancellable, Binding,
            ObservableObject,
            NSLayoutConstraint
        } from './src/core/index.js';

        const screen = new UIStackView('vertical');
        screen.alignment = 'fill';
        screen.minHeight = '100vh';
        screen.backgroundColor = UIColor.colorWithHex('#f5f5f7');
        document.body.appendChild(screen.element);

        const app = new UIStackView('vertical');
        app.spacing = 20;
        app.padding = 20;
        app.alignment = 'fill';
        app.translatesAutoresizingMaskIntoConstraints = false;
        screen.addSubview(app);

        NSLayoutConstraint.activateConstraints([
            app.widthAnchor.constraintLessThanOrEqualToConstant(1200),
            app.centerXAnchor.constraintEqualToAnchor(screen.centerXAnchor),
            app.topAnchor.constraintEqualToAnchor(screen.topAnchor),
            app.bottomAnchor.constraintEqualToAnchor(screen.bottomAnchor),
        ]);

        const cancellables = new Set();

        function makeSection() {
            const s = new UIStackView('vertical');
            s.spacing = 10;
            s.backgroundColor = UIColor.white();
            s.layer.cornerRadius = 12;
            s.padding = 20;
            s.shadow = { offsetX: 0, offsetY: 2, radius: 8, color: 'rgba(0,0,0,0.08)' };
            return s;
        }

        function makeDemoArea(axis = 'vertical') {
            const s = new UIStackView(axis);
            s.spacing = 15;
            s.alignment = 'leading';
            s.backgroundColor = UIColor.colorWithHex('#f5f5f7');
            s.layer.cornerRadius = 8;
            s.padding = 20;
            s.minHeight = 60;
            return s;
        }

        function headingLabel(text) {
            const l = new UILabel(text);
            l.font = UIFont.boldSystemFont(18);
            l.textColor = UIColor.colorWithHex('#1d1d1f');
            return l;
        }

        function tagLabel(text, color) {
            const l = new UILabel(text);
            l.font = UIFont.systemFont(11, '600');
            l.textColor = UIColor.white();
            l.backgroundColor = UIColor.colorWithHex(color);
            l.layer.cornerRadius = 4;
            l.padding = { top: 2, left: 8, bottom: 2, right: 8 };
            return l;
        }

        function stateLabel(text) {
            const l = new UILabel(text);
            l.font = UIFont.systemFont(12);
            l.textColor = UIColor.colorWithHex('#666666');
            return l;
        }

        function valueLabel(text) {
            const l = new UILabel(text);
            l.font = UIFont.monospacedSystemFont(14, '600');
            return l;
        }

        function indicator() {
            const v = new UIView({ x: 0, y: 0, width: 10, height: 10 });
            v.init();
            v.layer.cornerRadius = 5;
            v.backgroundColor = UIColor.colorWithHex('#34c759');
            return v;
        }

        const logColorMap = {
            ok: UIColor.colorWithHex('#4ec9b0'),
            info: UIColor.colorWithHex('#569cd6'),
            warn: UIColor.colorWithHex('#ce9178'),
            binding: UIColor.colorWithHex('#c586c0')
        };

        const logArea = (title) => {
            const section = new UIStackView('vertical');
            section.spacing = 10;
            section.backgroundColor = UIColor.white();
            section.layer.cornerRadius = 12;
            section.padding = 20;
            section.shadow = { offsetX: 0, offsetY: 2, radius: 8, color: 'rgba(0,0,0,0.08)' };
            const heading = headingLabel(title);
            const logContainer = new UIView();
            logContainer.init();
            logContainer.backgroundColor = UIColor.colorWithHex('#1e1e1e');
            logContainer.layer.cornerRadius = 8;
            logContainer.padding = 15;
            logContainer.maxHeight = '200px';
            logContainer.overflow = 'auto';
            section.addArrangedSubview(heading);
            section.addArrangedSubview(logContainer);
            app.addArrangedSubview(section);
            return (msg, type = 'info') => {
                const entry = new UILabel(`[${new Date().toLocaleTimeString()}] ${msg}`);
                entry.font = UIFont.monospacedSystemFont(12);
                entry.textColor = logColorMap[type] || UIColor.colorWithHex('#d4d4d4');
                entry.numberOfLines = 0;
                logContainer.addSubview(entry);
                logContainer.scrollToBottom();
            };
        };

        const log1 = logArea('CurrentValueSubject Demo');
        const log2 = logArea('Two-Way Binding Demo');
        const log3 = logArea('Array Demo');
        const log4 = logArea('Transform Binding Demo');

        const count = new CurrentValueSubject(42);
        log1('Creating CurrentValueSubject with initial value: 42');
        log1('Calling sink()...');
        const countCancellable = count.sink((newValue, oldValue) => {
            log1(`Value changed: ${oldValue} → ${newValue}`, 'ok');
        }).storeIn(cancellables);

        count.send(100);
        log1('Sent 100');
        count.send(100);
        log1('Sent 100 again (no change expected)');
        count.send(50);
        log1('Sent 50');

        countCancellable.cancel();
        log1('Cancelled. Sending 200 (no log expected)');
        count.send(200);
        log1(`History: ${JSON.stringify(count.changeHistory.map(h => ({from: h.oldValue, to: h.newValue})))}`, 'binding');

        const source = new CurrentValueSubject('Hello');
        const target = new CurrentValueSubject('World');
        log2('Two-way binding');
        const binding = source.bindTo(target, { twoWay: true });
        binding.activate();
        log2(`source="${source.value}", target="${target.value}"`, 'ok');
        source.send('Bonjour');
        log2(`source="${source.value}", target="${target.value}"`, 'ok');
        target.send('Mond');
        log2(`source="${source.value}", target="${target.value}"`, 'ok');
        binding.deactivate();
        source.send('Hola');
        log2(`Deactivated. source="${source.value}", target="${target.value}"`, 'ok');

        const items = new CurrentValueSubject(['Apple', 'Banana', 'Cherry']);
        const itemsCancellable = items.sink((arr) => {
            log3(`[${arr.join(', ')}]`, 'ok');
        }).storeIn(cancellables);
        items.send([...items.value, 'Date']);
        items.send(items.value.filter(i => i !== 'Banana'));
        itemsCancellable.cancel();

        const percentage = new CurrentValueSubject(100);
        const progressWidth = new CurrentValueSubject(0);
        const progressBinding = percentage.bindTo(progressWidth, {
            twoWay: false, transformTo: (p) => p * 2, transformFrom: (w) => w / 2
        });
        progressBinding.activate();
        log4(`${percentage.value}% → ${progressWidth.value}px`, 'ok');
        percentage.send(75);
        log4(`${percentage.value}% → ${progressWidth.value}px`, 'ok');

        // ── Section 5: Interactive Binding Demo ──
        const section5 = makeSection();
        const h5 = new UIStackView('horizontal');
        h5.spacing = 10;
        h5.alignment = 'center';
        h5.addArrangedSubview(headingLabel('Interactive Binding Demo'));
        h5.addArrangedSubview(tagLabel('Interactive', '#5856d6'));
        section5.addArrangedSubview(h5);
        app.addArrangedSubview(section5);

        const demoArea5 = makeDemoArea('vertical');
        section5.addArrangedSubview(demoArea5);

        const tfValue = new CurrentValueSubject('Hello');
        const sliderValue = new CurrentValueSubject(210);
        const scaleValue = new CurrentValueSubject(1.0);

        const row1 = new UIStackView('horizontal');
        row1.spacing = 20;
        row1.alignment = 'center';
        const tfState = new UIStackView('horizontal');
        tfState.spacing = 8;
        tfState.alignment = 'center';
        const tfValLabel = valueLabel('Hello');
        tfState.addArrangedSubview(stateLabel('TextField:'));
        tfState.addArrangedSubview(tfValLabel);
        tfState.addArrangedSubview(indicator());
        const lblState = new UIStackView('horizontal');
        lblState.spacing = 8;
        lblState.alignment = 'center';
        const lblValLabel = valueLabel('Hello');
        lblState.addArrangedSubview(stateLabel('Label:'));
        lblState.addArrangedSubview(lblValLabel);
        lblState.addArrangedSubview(indicator());
        row1.addArrangedSubview(tfState);
        row1.addArrangedSubview(lblState);
        demoArea5.addArrangedSubview(row1);

        const row2 = new UIStackView('horizontal');
        row2.spacing = 15;
        row2.alignment = 'center';
        const tfInput = new UITextField('Type something...');
        tfInput.font = UIFont.systemFont(14);
        tfInput.text = 'Hello';
        const colorBoxView = new UIStackView('vertical');
        colorBoxView.alignment = 'center';
        colorBoxView.distribution = 'center';
        colorBoxView.frame = { x: 0, y: 0, width: 80, height: 80 };
        colorBoxView.layer.cornerRadius = 12;
        colorBoxView.backgroundColor = UIColor.colorWithHSB(210 / 360, 1, 1);
        colorBoxView.clipsToBounds = true;
        const colorBoxLabel = new UILabel('BOX');
        colorBoxLabel.font = UIFont.boldSystemFont(12);
        colorBoxLabel.textColor = UIColor.white();
        colorBoxLabel.textAlignment = 'center';
        colorBoxView.addArrangedSubview(colorBoxLabel);
        row2.addArrangedSubview(tfInput);
        row2.addArrangedSubview(colorBoxView);
        demoArea5.addArrangedSubview(row2);

        const row3 = new UIStackView('horizontal');
        row3.spacing = 15;
        row3.alignment = 'center';
        const hueDesc = stateLabel('Hue: 210');
        const hueSlider = new UISlider();
        hueSlider.minimumValue = 0;
        hueSlider.maximumValue = 360;
        hueSlider.value = 210;
        hueSlider.setContentHuggingPriority(1, 'horizontal');
        row3.addArrangedSubview(hueDesc);
        row3.addArrangedSubview(hueSlider);
        demoArea5.addArrangedSubview(row3);

        const row4 = new UIStackView('horizontal');
        row4.spacing = 20;
        row4.alignment = 'center';
        const slState = new UIStackView('horizontal');
        slState.spacing = 8;
        slState.alignment = 'center';
        const slValLabel = valueLabel('210');
        slState.addArrangedSubview(stateLabel('Slider Value:'));
        slState.addArrangedSubview(slValLabel);
        const scState = new UIStackView('horizontal');
        scState.spacing = 8;
        scState.alignment = 'center';
        const scValLabel = valueLabel('1.0');
        scState.addArrangedSubview(stateLabel('Box Scale:'));
        scState.addArrangedSubview(scValLabel);
        const scaleSlider = new UISlider();
        scaleSlider.minimumValue = 50;
        scaleSlider.maximumValue = 150;
        scaleSlider.value = 100;
        row4.addArrangedSubview(slState);
        row4.addArrangedSubview(scState);
        row4.addArrangedSubview(scaleSlider);
        demoArea5.addArrangedSubview(row4);

        tfInput.addTarget(tfValue, (sender) => { tfValue.value = sender.text; });
        hueSlider.addTarget(sliderValue, (sender) => { sliderValue.value = Math.round(sender.value); });
        scaleSlider.addTarget(scaleValue, (sender) => { scaleValue.value = sender.value / 100; });

        tfValue.sink((v) => { tfValLabel.text = v; lblValLabel.text = v; }).storeIn(cancellables);
        sliderValue.sink((v) => {
            slValLabel.text = String(v);
            hueDesc.text = `Hue: ${v}`;
            colorBoxView.backgroundColor = UIColor.colorWithHSB(v / 360, 1, 1);
        }).storeIn(cancellables);
        scaleValue.sink((v) => {
            scValLabel.text = v.toFixed(1);
            colorBoxView.transform = `scale(${v})`;
        }).storeIn(cancellables);

        // ── Section 6: ObservableObject + KVO Demo ──
        const section6 = makeSection();
        const h6 = new UIStackView('horizontal');
        h6.spacing = 10;
        h6.alignment = 'center';
        h6.addArrangedSubview(headingLabel('ObservableObject + KVO Demo'));
        h6.addArrangedSubview(tagLabel('ObservableObject', '#ff9500'));
        section6.addArrangedSubview(h6);
        app.addArrangedSubview(section6);

        const demoArea6 = makeDemoArea('vertical');
        section6.addArrangedSubview(demoArea6);

        const objDisplay = new UIStackView('vertical');
        objDisplay.spacing = 4;
        objDisplay.backgroundColor = UIColor.colorWithHex('#fff3cd');
        objDisplay.layer.cornerRadius = 6;
        objDisplay.layer.borderWidth = 1;
        objDisplay.layer.borderColor = UIColor.colorWithHex('#ffc107');
        objDisplay.padding = 10;
        objDisplay.minHeight = 40;
        const objLabel = new UILabel('ObservableObject State');
        objLabel.font = UIFont.systemFont(11);
        objLabel.textColor = UIColor.colorWithHex('#856404');
        objLabel.numberOfLines = 0;
        const objState = new UILabel('Loading...');
        objState.font = UIFont.monospacedSystemFont(13);
        objState.numberOfLines = 0;
        objDisplay.addArrangedSubview(objLabel);
        objDisplay.addArrangedSubview(objState);
        demoArea6.addArrangedSubview(objDisplay);

        const btnRow = new UIStackView('horizontal');
        btnRow.spacing = 15;
        btnRow.alignment = 'center';
        const btnName = new UIButton('Change Name');
        btnName.font = UIFont.systemFont(14, '600');
        const btnAge = new UIButton('Increment Age');
        btnAge.backgroundColor = UIColor.colorWithHex('#34c759');
        btnAge.font = UIFont.systemFont(14, '600');
        const btnEmail = new UIButton('Update Email');
        btnEmail.backgroundColor = UIColor.colorWithHex('#ff9500');
        btnEmail.font = UIFont.systemFont(14, '600');
        const btnReset = new UIButton('Reset All');
        btnReset.backgroundColor = UIColor.colorWithHex('#5856d6');
        btnReset.font = UIFont.systemFont(14, '600');
        btnRow.addArrangedSubview(btnName);
        btnRow.addArrangedSubview(btnAge);
        btnRow.addArrangedSubview(btnEmail);
        btnRow.addArrangedSubview(btnReset);
        demoArea6.addArrangedSubview(btnRow);

        class Person extends ObservableObject {
            constructor(name, age, email) {
                super();
                this._name = name;
                this._age = age;
                this._email = email;
            }
            get name() { return this._name; }
            set name(v) { this.willChangeValue('name'); this._name = v; this.$set('name', v); this.didChangeValue('name'); }
            get age() { return this._age; }
            set age(v) { this.willChangeValue('age'); this._age = v; this.$set('age', v); this.didChangeValue('age'); }
            get email() { return this._email; }
            set email(v) { this.willChangeValue('email'); this._email = v; this.$set('email', v); this.didChangeValue('email'); }
        }

        const person = new Person('John', 30, 'john@example.com');
        const updateDisplay = () => {
            objState.text = JSON.stringify({ name: person.name, age: person.age, email: person.email }, null, 2);
        };
        person.$observe('name', (v) => log1(`Name: ${v}`, 'binding'));
        person.$observe('age', (v) => log1(`Age: ${v}`, 'binding'));
        person.$observe('email', (v) => log1(`Email: ${v}`, 'binding'));
        person.observe('name', (_, change) => {
            if (change.kind === 'set') log1(`KVO: name = ${change.newValue}`, 'warn');
        }).storeIn(cancellables);
        updateDisplay();

        btnName.addTarget(null, () => { person.name = person.name === 'John' ? 'Jane' : 'John'; updateDisplay(); });
        btnAge.addTarget(null, () => { person.age = person.age + 1; updateDisplay(); });
        btnEmail.addTarget(null, () => { person.email = `user${Date.now()}@example.com`; updateDisplay(); });
        btnReset.addTarget(null, () => { person.$unbindAll(); person.name = 'John'; person.age = 30; person.email = 'john@example.com'; updateDisplay(); });

        // ── Section 7: Array Demo ──
        const section7 = makeSection();
        const h7 = new UIStackView('horizontal');
        h7.spacing = 10;
        h7.alignment = 'center';
        h7.addArrangedSubview(headingLabel('Array Demo'));
        h7.addArrangedSubview(tagLabel('Interactive', '#ff9500'));
        section7.addArrangedSubview(h7);
        app.addArrangedSubview(section7);

        const demoArea7 = makeDemoArea('vertical');
        section7.addArrangedSubview(demoArea7);

        const fruitList = new UIStackView('vertical');
        fruitList.spacing = 8;
        fruitList.alignment = 'fill';
        demoArea7.addArrangedSubview(fruitList);

        const fruitRow = new UIStackView('horizontal');
        fruitRow.spacing = 15;
        fruitRow.alignment = 'center';
        fruitRow.margin = { top: 15 };
        const newItemInput = new UITextField('New item name...');
        newItemInput.font = UIFont.systemFont(14);
        const btnAdd = new UIButton('Add');
        btnAdd.font = UIFont.systemFont(14, '600');
        const btnRemove = new UIButton('Remove Last');
        btnRemove.backgroundColor = UIColor.colorWithHex('#34c759');
        btnRemove.font = UIFont.systemFont(14, '600');
        const btnClear = new UIButton('Clear All');
        btnClear.backgroundColor = UIColor.colorWithHex('#ff9500');
        btnClear.font = UIFont.systemFont(14, '600');
        fruitRow.addArrangedSubview(newItemInput);
        fruitRow.addArrangedSubview(btnAdd);
        fruitRow.addArrangedSubview(btnRemove);
        fruitRow.addArrangedSubview(btnClear);
        demoArea7.addArrangedSubview(fruitRow);

        const fruits = new CurrentValueSubject(['Apple', 'Banana', 'Cherry', 'Date']);
        const renderFruits = (arr) => {
            fruitList.removeAllArrangedSubviews();
            arr.forEach((fruit, index) => {
                const item = new UIStackView('vertical');
                item.spacing = 2;
                item.backgroundColor = UIColor.colorWithHex('#f0f0f0');
                item.padding = { top: 12, left: 16, bottom: 12, right: 16 };
                item.layer.cornerRadius = 8;
                const title = new UILabel(fruit);
                title.font = UIFont.systemFont(14, '500');
                const sub = new UILabel(`Index: ${index}`);
                sub.font = UIFont.systemFont(12);
                sub.textColor = UIColor.colorWithHex('#666666');
                item.addArrangedSubview(title);
                item.addArrangedSubview(sub);
                fruitList.addArrangedSubview(item);
            });
        };
        fruits.sink((arr) => renderFruits(arr)).storeIn(cancellables);

        btnAdd.addTarget(null, () => {
            const text = newItemInput.text.trim();
            if (text) { fruits.send([...fruits.value, text]); newItemInput.text = ''; }
        });
        btnRemove.addTarget(null, () => { const a = [...fruits.value]; a.pop(); fruits.send(a); });
        btnClear.addTarget(null, () => { fruits.send([]); });

    </script>
</body>
</html>
