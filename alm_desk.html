<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Web Desktop OS - JIT Code Studio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 20% 30%, #1a2a3a, #0b1219);
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      position: relative;
    }

    /* DESKTOP CONTAINER */
    .web-desktop {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32"><path fill="rgba(255,255,255,0.03)" d="M0 0h32v32H0z"/><path fill="rgba(255,255,255,0.02)" d="M16 0L0 16h32z"/></svg>');
    }

    /* ICONS GRID */
    .desktop-icons {
      position: relative;
      display: flex;
      flex-wrap: wrap;
      flex-direction: column;
      align-items: flex-start;
      gap: 20px;
      padding: 20px;
      z-index: 10;
      width: fit-content;
    }

    .desktop-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 85px;
      cursor: pointer;
      border-radius: 8px;
      padding: 8px 4px;
      transition: background 0.15s;
      background: transparent;
    }

    .desktop-icon:hover {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(4px);
    }

    .icon-img {
      font-size: 42px;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
    }

    .icon-label {
      color: white;
      text-shadow: 0 1px 2px black;
      font-size: 12px;
      font-weight: 500;
      margin-top: 6px;
      text-align: center;
      background: rgba(0,0,0,0.6);
      padding: 2px 8px;
      border-radius: 12px;
      backdrop-filter: blur(4px);
      word-break: break-word;
      max-width: 90px;
    }

    /* WINDOW STYLES */
    .window {
      position: absolute;
      min-width: 300px;
      min-height: 240px;
      background: rgba(32, 32, 40, 0.96);
      backdrop-filter: blur(20px);
      border-radius: 12px;
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.2);
      display: flex;
      flex-direction: column;
      z-index: 100;
      overflow: hidden;
      transition: box-shadow 0.1s;
    }

    .window.active {
      z-index: 200;
      box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(100, 150, 255, 0.7);
    }

    .window.minimized {
      display: none;
    }

    .window-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: rgba(20, 20, 28, 0.9);
      cursor: grab;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px 12px 0 0;
    }

    .window-header:active {
      cursor: grabbing;
    }

    .window-title {
      color: white;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.3px;
    }

    .window-controls {
      display: flex;
      gap: 10px;
    }

    .window-controls button {
      background: none;
      border: none;
      color: #ddd;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      width: 24px;
      height: 24px;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .window-controls button:hover {
      background: rgba(255,255,255,0.2);
      color: white;
    }

    .minimize-btn:hover {
      background: #2c6e2c !important;
    }

    .close-btn:hover {
      background: #e81123 !important;
      color: white;
    }

    .window-content {
      flex: 1;
      padding: 14px;
      overflow: auto;
      color: #eef;
      background: rgba(0, 0, 0, 0.3);
    }

    /* EDITOR & PREVIEW */
    .code-editor-layout {
      display: flex;
      flex-direction: column;
      height: 100%;
      gap: 12px;
    }

    .editor-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .jit-badge {
      background: #2c6e2c;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: bold;
      color: white;
    }

    textarea.code-input {
      width: 100%;
      height: 180px;
      background: #1e1e2f;
      border: 1px solid #3a3a4a;
      border-radius: 10px;
      color: #d4d4d4;
      font-family: 'Fira Code', 'Cascadia Code', monospace;
      font-size: 12px;
      padding: 10px;
      resize: vertical;
      outline: none;
    }

    .preview-area {
      background: #fff;
      border-radius: 12px;
      min-height: 160px;
      border: 1px solid rgba(0,0,0,0.2);
      overflow: auto;
    }

    iframe.preview-frame {
      width: 100%;
      height: 200px;
      border: none;
      background: white;
      border-radius: 10px;
    }

    /* BOTTOM TASKBAR (Windows XP style) */
    .taskbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 48px;
      background: linear-gradient(180deg, #245edb 0%, #0f3a8a 100%);
      backdrop-filter: blur(0px);
      border-top: 1px solid #3c78e0;
      display: flex;
      align-items: center;
      padding: 0 8px;
      z-index: 1000;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.3);
    }

    .start-button {
      background: linear-gradient(180deg, #3c8c40 0%, #1e5e22 100%);
      border-radius: 6px;
      padding: 6px 16px;
      color: white;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 1px 2px black;
      margin-right: 16px;
    }

    .start-button:hover {
      background: linear-gradient(180deg, #4ca050 0%, #2a6e2e 100%);
    }

    .taskbar-windows {
      display: flex;
      gap: 6px;
      flex: 1;
      overflow-x: auto;
    }

    .taskbar-item {
      background: rgba(0,0,0,0.5);
      border-radius: 6px;
      padding: 6px 12px;
      color: white;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 120px;
      max-width: 180px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .taskbar-item.active {
      background: rgba(255,255,255,0.25);
      border-left: 3px solid #ffcc00;
    }

    .taskbar-item:hover {
      background: rgba(255,255,255,0.35);
    }

    .clock-area {
      background: rgba(0,0,0,0.6);
      padding: 6px 14px;
      border-radius: 8px;
      color: white;
      font-family: monospace;
      font-weight: bold;
      font-size: 13px;
    }

    /* start menu */
    .start-menu {
      position: fixed;
      bottom: 52px;
      left: 8px;
      width: 260px;
      background: rgba(30,30,40,0.98);
      backdrop-filter: blur(16px);
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 8px 20px black;
      z-index: 1001;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .start-menu-item {
      padding: 10px;
      color: white;
      cursor: pointer;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: background 0.1s;
    }

    .start-menu-item:hover {
      background: rgba(100,150,255,0.4);
    }

    .widget-generic {
      padding: 8px;
    }
    .notes-textarea {
      width: 100%;
      background: #2a2a34;
      color: #eee;
      border-radius: 8px;
      padding: 8px;
      border: none;
    }
    .clock-widget {
      font-size: 2rem;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="web-desktop" id="webDesktop"></div>
<div class="taskbar" id="taskbar"></div>

<script>
  // ---------- STATE ----------
  let windows = [];
  let nextId = 1;
  let dragTarget = null, dragOffsetX = 0, dragOffsetY = 0;
  let activeWindowId = null;
  let startMenuOpen = false;

  // helpers
  function saveState() {
    const toStore = windows.map(win => ({
      id: win.id,
      title: win.title,
      widgetType: win.widgetType,
      extraData: win.extraData,
      x: win.x, y: win.y, width: win.width, height: win.height,
      zIndex: win.zIndex,
      minimized: win.minimized || false
    }));
    localStorage.setItem('webDesktopState', JSON.stringify({ windows: toStore, nextId }));
  }

  function loadState() {
    const saved = localStorage.getItem('webDesktopState');
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        windows = parsed.windows.map(win => ({
          ...win,
          minimized: win.minimized || false,
          contentGenerator: getGeneratorFromType(win.widgetType, win.extraData)
        }));
        nextId = parsed.nextId || 1;
        windows.forEach(win => {
          if (!win.width) win.width = 520;
          if (!win.height) win.height = 400;
          if (win.x === undefined) win.x = 80;
          if (win.y === undefined) win.y = 70;
        });
      } catch(e) { console.warn(e); }
    }
    if (windows.length === 0) createDefaultWindows();
    renderFull();
  }

  function getGeneratorFromType(type, extra) {
    if (type === 'clock') return () => createClockWidget();
    if (type === 'notes') return () => createNotesWidget(extra?.notesText || '');
    if (type === 'codeEditor') return () => createCodeEditorWidget(extra?.codeContent || defaultCodeSnippet());
    if (type === 'webLink') return () => createWeblinkWidget(extra?.url || 'https://example.com', extra?.embedCode || '');
    if (type === 'customHtml') return () => createCustomHtmlWidget(extra?.htmlContent || '<h2>Custom Widget</h2><p>Your HTML here</p>');
    return () => createGenericWidget(type);
  }

  function createDefaultWindows() {
    addWindow('💻 JIT Code Editor', 'codeEditor', { codeContent: defaultCodeSnippet() }, 60, 50, 640, 520);
    addWindow('⏰ Live Clock', 'clock', {}, 520, 50, 280, 200);
    addWindow('📝 Sticky Notes', 'notes', { notesText: 'Write your ideas... Right-click desktop? use start menu to add icons!' }, 200, 320, 320, 260);
  }

  function addWindow(title, widgetType, extraData, x, y, w, h, minimized = false) {
    const id = nextId++;
    windows.push({
      id, title, widgetType, extraData: extraData || {},
      contentGenerator: getGeneratorFromType(widgetType, extraData),
      x, y, width: w, height: h, zIndex: 100 + windows.length, minimized
    });
    saveState();
    renderFull();
  }

  function closeWindow(id) {
    windows = windows.filter(w => w.id !== id);
    if (activeWindowId === id) activeWindowId = null;
    saveState();
    renderFull();
  }

  function minimizeWindow(id) {
    const win = windows.find(w => w.id === id);
    if (win) {
      win.minimized = true;
      if (activeWindowId === id) activeWindowId = null;
      saveState();
      renderFull();
    }
  }

  function restoreWindow(id) {
    const win = windows.find(w => w.id === id);
    if (win) {
      win.minimized = false;
      bringToFront(id);
    }
    saveState();
    renderFull();
  }

  function bringToFront(id) {
    const maxZ = Math.max(0, ...windows.map(w => w.zIndex), 200);
    windows = windows.map(w => {
      if (w.id === id) {
        activeWindowId = id;
        return { ...w, zIndex: maxZ + 1, minimized: false };
      }
      return w;
    });
    saveState();
    renderFull();
  }

  // ---- UI RENDER ----
  function renderFull() {
    renderDesktop();
    renderTaskbar();
  }

  function renderDesktop() {
    const desktop = document.getElementById('webDesktop');
    if (!desktop) return;
    desktop.innerHTML = '';
    
    // Desktop icons (user-created)
    const iconsContainer = document.createElement('div');
    iconsContainer.className = 'desktop-icons';
    
    // collect custom icons from localStorage or default
    let customIcons = JSON.parse(localStorage.getItem('webDesktopIcons') || '[]');
    if (customIcons.length === 0) {
      customIcons = [
        { id: 'custom_example', label: 'WebLink Demo', icon: '🌐', type: 'webLink', data: { url: 'https://example.com', embedCode: '' } },
        { id: 'custom_html_demo', label: 'HTML Sandbox', icon: '📄', type: 'customHtml', data: { htmlContent: '<div style="padding:20px; background:linear-gradient(135deg,#667eea,#764ba2); color:white; border-radius:16px;"><h3>Custom Card</h3><p>Created from desktop icon!</p><button onclick="alert(\'hello from widget\')">Click</button></div>' } }
      ];
      localStorage.setItem('webDesktopIcons', JSON.stringify(customIcons));
    }
    
    customIcons.forEach(ic => {
      const iconDiv = document.createElement('div');
      iconDiv.className = 'desktop-icon';
      iconDiv.innerHTML = `<div class="icon-img">${ic.icon}</div><div class="icon-label">${escapeHtml(ic.label)}</div>`;
      iconDiv.addEventListener('click', (e) => {
        e.stopPropagation();
        // open window of that type
        const exists = windows.find(w => w.widgetType === ic.type && w.title === ic.label);
        if (exists && !exists.minimized) {
          bringToFront(exists.id);
        } else if (exists && exists.minimized) {
          restoreWindow(exists.id);
        } else {
          addWindow(ic.label, ic.type, ic.data, 100 + Math.random() * 80, 80 + Math.random() * 100, 500, 400);
        }
      });
      iconsContainer.appendChild(iconDiv);
    });
    
    // built-in app launcher icon
    const addIconBtn = document.createElement('div');
    addIconBtn.className = 'desktop-icon';
    addIconBtn.innerHTML = `<div class="icon-img">➕</div><div class="icon-label">New Icon</div>`;
    addIconBtn.addEventListener('click', () => promptNewIcon());
    iconsContainer.appendChild(addIconBtn);
    
    desktop.appendChild(iconsContainer);
    
    // render windows (non minimized)
    const sorted = [...windows].sort((a,b) => a.zIndex - b.zIndex);
    sorted.forEach(win => {
      if (win.minimized) return;
      const winEl = createWindowElement(win);
      desktop.appendChild(winEl);
    });
    
    attachDragSystem();
    attachDynamicEditors();
  }

  function createWindowElement(win) {
    const div = document.createElement('div');
    div.className = 'window' + (activeWindowId === win.id ? ' active' : '');
    div.style.position = 'absolute';
    div.style.left = win.x + 'px';
    div.style.top = win.y + 'px';
    div.style.width = win.width + 'px';
    div.style.height = win.height + 'px';
    div.style.zIndex = win.zIndex;
    div.setAttribute('data-id', win.id);
    
    const header = document.createElement('div');
    header.className = 'window-header';
    header.innerHTML = `<span class="window-title">${escapeHtml(win.title)}</span>
                        <div class="window-controls">
                          <button class="minimize-btn" title="minimize">−</button>
                          <button class="close-btn" title="close">✕</button>
                        </div>`;
    
    const contentDiv = document.createElement('div');
    contentDiv.className = 'window-content';
    const contentWrapper = document.createElement('div');
    contentWrapper.id = `win-content-${win.id}`;
    contentDiv.appendChild(contentWrapper);
    div.appendChild(header);
    div.appendChild(contentDiv);
    
    // generate content
    const generated = win.contentGenerator();
    contentWrapper.innerHTML = '';
    contentWrapper.appendChild(generated);
    
    // attach events
    header.querySelector('.close-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      closeWindow(win.id);
    });
    header.querySelector('.minimize-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      minimizeWindow(win.id);
    });
    
    // drag header
    header.addEventListener('mousedown', (e) => {
      if (e.target.tagName === 'BUTTON') return;
      e.preventDefault();
      bringToFront(win.id);
      dragTarget = div;
      const rect = div.getBoundingClientRect();
      dragOffsetX = e.clientX - rect.left;
      dragOffsetY = e.clientY - rect.top;
      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    });
    return div;
  }
  
  function onMouseMove(e) {
    if (!dragTarget) return;
    const newLeft = e.clientX - dragOffsetX;
    const newTop = e.clientY - dragOffsetY;
    const winId = parseInt(dragTarget.getAttribute('data-id'));
    const win = windows.find(w => w.id === winId);
    if (win) {
      win.x = Math.min(Math.max(newLeft, 0), window.innerWidth - 150);
      win.y = Math.min(Math.max(newTop, 0), window.innerHeight - 100);
      dragTarget.style.left = win.x + 'px';
      dragTarget.style.top = win.y + 'px';
      saveState();
    }
  }
  
  function onMouseUp() {
    dragTarget = null;
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('mouseup', onMouseUp);
  }
  
  function attachDragSystem() {
    // re-attach any window click to front
    document.querySelectorAll('.window').forEach(w => {
      w.addEventListener('mousedown', (e) => {
        const id = parseInt(w.getAttribute('data-id'));
        bringToFront(id);
      });
    });
  }
  
  function attachDynamicEditors() {
    windows.forEach(win => {
      if (win.widgetType === 'codeEditor' && !win.minimized) {
        setTimeout(() => {
          const wrapper = document.getElementById(`win-content-${win.id}`);
          if (wrapper) {
            const textarea = wrapper.querySelector('.code-input');
            const iframe = wrapper.querySelector('.preview-frame');
            if (textarea && iframe) {
              const update = () => {
                const code = textarea.value;
                win.extraData.codeContent = code;
                updateIframePreview(iframe, code);
                saveState();
              };
              textarea.addEventListener('input', update);
              update();
            }
          }
        }, 20);
      }
      if (win.widgetType === 'notes' && !win.minimized) {
        setTimeout(() => {
          const wrapper = document.getElementById(`win-content-${win.id}`);
          const notesArea = wrapper?.querySelector('.notes-textarea');
          if (notesArea) {
            notesArea.addEventListener('input', (e) => {
              win.extraData.notesText = e.target.value;
              saveState();
            });
          }
        }, 20);
      }
      if (win.widgetType === 'customHtml' && !win.minimized) {
        // live update for custom html editor if needed
      }
    });
  }
  
  function updateIframePreview(iframe, code) {
    const doc = iframe.contentDocument || iframe.contentWindow.document;
    doc.open();
    doc.write(code);
    doc.close();
  }
  
  // WIDGETS
  function createClockWidget() {
    const div = document.createElement('div');
    div.className = 'widget-generic';
    const display = document.createElement('div');
    display.className = 'clock-widget';
    div.appendChild(display);
    const update = () => {
      const now = new Date();
      display.innerHTML = now.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' }) + '<br>' + now.toLocaleDateString();
    };
    update();
    const interval = setInterval(update, 1000);
    div.setAttribute('data-interval', interval);
    return div;
  }
  
  function createNotesWidget(text) {
    const div = document.createElement('div');
    const ta = document.createElement('textarea');
    ta.className = 'notes-textarea';
    ta.rows = 8;
    ta.value = text || '';
    div.appendChild(ta);
    return div;
  }
  
  function createCodeEditorWidget(code) {
    const layout = document.createElement('div');
    layout.className = 'code-editor-layout';
    layout.innerHTML = `<div class="editor-toolbar"><span class="jit-badge">⚡ JIT LIVE PREVIEW</span><span>HTML/CSS/JS</span></div>
                        <textarea class="code-input" spellcheck="false"></textarea>
                        <div class="preview-area"><iframe class="preview-frame" sandbox="allow-same-origin allow-scripts"></iframe></div>`;
    const ta = layout.querySelector('.code-input');
    ta.value = code || defaultCodeSnippet();
    return layout;
  }
  
  function createWeblinkWidget(url, embedCode) {
    const div = document.createElement('div');
    div.className = 'widget-generic';
    if (embedCode) {
      div.innerHTML = embedCode;
    } else {
      div.innerHTML = `<iframe src="${escapeHtml(url)}" style="width:100%; height:300px; border-radius:12px; border:none;"></iframe><p><a href="${escapeHtml(url)}" target="_blank">Open ${escapeHtml(url)}</a></p>`;
    }
    return div;
  }
  
  function createCustomHtmlWidget(htmlContent) {
    const container = document.createElement('div');
    container.className = 'widget-generic';
    const editor = document.createElement('textarea');
    editor.value = htmlContent || '<h2>Custom HTML</h2><p>Edit and see changes</p>';
    editor.style.width = '100%';
    editor.style.height = '120px';
    editor.style.background = '#1e1e2a';
    editor.style.color = '#eee';
    const preview = document.createElement('div');
    preview.style.background = 'white';
    preview.style.borderRadius = '12px';
    preview.style.marginTop = '8px';
    preview.style.padding = '8px';
    preview.style.minHeight = '120px';
    const update = () => {
      preview.innerHTML = editor.value;
    };
    editor.addEventListener('input', update);
    update();
    container.appendChild(editor);
    container.appendChild(preview);
    return container;
  }
  
  function createGenericWidget(title) {
    const d = document.createElement('div');
    d.innerHTML = `<h3>${escapeHtml(title)}</h3><p>Widget container</p>`;
    return d;
  }
  
  function defaultCodeSnippet() {
    return `<!DOCTYPE html>
<html>
<head><style>body{font-family:sans-serif;padding:20px;background:#eef2ff;}button{background:#2273e0;border:none;padding:8px 20px;border-radius:30px;color:white;cursor:pointer;}</style></head>
<body><h2>✨ JIT Live Editor</h2><p>Edit this HTML and see changes instantly!</p><button id="btn">Click me</button><p id="msg"></p>
<script>document.getElementById('btn')?.addEventListener('click',()=>document.getElementById('msg').innerText='Live at '+new Date().toLocaleTimeString());<\/script></body></html>`;
  }
  
  // TASKBAR
  function renderTaskbar() {
    const taskbar = document.getElementById('taskbar');
    taskbar.innerHTML = `
      <div class="start-button" id="startBtn">🪟 Start</div>
      <div class="taskbar-windows" id="taskbarWindows"></div>
      <div class="clock-area" id="liveClock"></div>
    `;
    const taskWindows = document.getElementById('taskbarWindows');
    windows.forEach(win => {
      const btn = document.createElement('div');
      btn.className = `taskbar-item ${activeWindowId === win.id ? 'active' : ''}`;
      btn.innerHTML = `<span>${win.title.substring(0, 20)}</span>`;
      btn.addEventListener('click', () => {
        if (win.minimized) restoreWindow(win.id);
        else if (!win.minimized) {
          if (activeWindowId === win.id) minimizeWindow(win.id);
          else bringToFront(win.id);
        }
      });
      taskWindows.appendChild(btn);
    });
    document.getElementById('startBtn')?.addEventListener('click', toggleStartMenu);
    updateTaskbarClock();
    setInterval(updateTaskbarClock, 1000);
  }
  
  function updateTaskbarClock() {
    const clockDiv = document.getElementById('liveClock');
    if (clockDiv) clockDiv.innerText = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
  }
  
  function toggleStartMenu() {
    if (startMenuOpen) {
      document.querySelector('.start-menu')?.remove();
      startMenuOpen = false;
    } else {
      const menu = document.createElement('div');
      menu.className = 'start-menu';
      menu.innerHTML = `
        <div class="start-menu-item" data-action="newIcon">➕ Create New Desktop Icon</div>
        <div class="start-menu-item" data-action="newWeblink">🌐 Add Web Link Icon</div>
        <div class="start-menu-item" data-action="newHtml">📄 Add Custom HTML Icon</div>
        <hr style="margin:8px 0; border-color:#444;">
        <div class="start-menu-item" data-action="about">ℹ️ About Web Desktop</div>
      `;
      menu.querySelectorAll('.start-menu-item').forEach(item => {
        item.addEventListener('click', (e) => {
          const action = item.getAttribute('data-action');
          if (action === 'newIcon') promptNewIcon();
          if (action === 'newWeblink') promptWeblinkIcon();
          if (action === 'newHtml') promptHtmlIcon();
          if (action === 'about') alert('Web Desktop OS - JIT Editor, movable windows, persistent storage, Windows XP style taskbar');
          toggleStartMenu();
        });
      });
      document.body.appendChild(menu);
      startMenuOpen = true;
      const closeMenu = (e) => { if (!menu.contains(e.target) && !e.target.closest('.start-button')) { toggleStartMenu(); document.removeEventListener('click', closeMenu); } };
      setTimeout(() => document.addEventListener('click', closeMenu), 100);
    }
  }
  
  function promptNewIcon() {
    const label = prompt('Icon label:', 'My App');
    const iconEmoji = prompt('Icon emoji:', '📦');
    if (label && iconEmoji) {
      let icons = JSON.parse(localStorage.getItem('webDesktopIcons') || '[]');
      icons.push({ id: Date.now(), label, icon: iconEmoji, type: 'customHtml', data: { htmlContent: `<div style="padding:20px;"><h3>${escapeHtml(label)}</h3><p>Custom widget content</p></div>` } });
      localStorage.setItem('webDesktopIcons', JSON.stringify(icons));
      renderFull();
    }
  }
  
  function promptWeblinkIcon() {
    const label = prompt('Link label:', 'My Website');
    const url = prompt('URL:', 'https://example.com');
    if (label && url) {
      let icons = JSON.parse(localStorage.getItem('webDesktopIcons') || '[]');
      icons.push({ id: Date.now(), label, icon: '🔗', type: 'webLink', data: { url, embedCode: '' } });
      localStorage.setItem('webDesktopIcons', JSON.stringify(icons));
      renderFull();
    }
  }
  
  function promptHtmlIcon() {
    const label = prompt('HTML Widget label:', 'Custom HTML');
    const htmlCode = prompt('HTML content (basic):', '<div style="background:#f0f0f0;padding:16px;"><h3>My Widget</h3><button>Click</button></div>');
    if (label && htmlCode) {
      let icons = JSON.parse(localStorage.getItem('webDesktopIcons') || '[]');
      icons.push({ id: Date.now(), label, icon: '📄', type: 'customHtml', data: { htmlContent: htmlCode } });
      localStorage.setItem('webDesktopIcons', JSON.stringify(icons));
      renderFull();
    }
  }
  
  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
  
  window.addEventListener('resize', () => {
    windows.forEach(win => { win.x = Math.min(win.x, window.innerWidth-120); win.y = Math.min(win.y, window.innerHeight-80); });
    saveState(); renderFull();
  });
  
  loadState();
  window.addEventListener('beforeunload', () => saveState());
</script>
</body>
</html>
